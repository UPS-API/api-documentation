          pattern: '^(?!.*<script[^>]*>).*$'
        encryptedMerchantId:
          description: Encrypted merchant ID for the enrollment
          type: string
          maxLength: 3000
          pattern: '^(?!.*<script[^>]*>).*$'          
        marketplaceId:
          description: Marketplace ID for the enrollment
          type: string
          maxLength: 3000
          pattern: '^(?!.*<script[^>]*>).*$'
        encryptedMarketplaceId:
          description: Encrypted marketplace ID for the enrollment
          type: string
          maxLength: 3000
          pattern: '^(?!.*<script[^>]*>).*$'                  
        authToken:
          description: Service Provider defined authorization token for the enrollment
          type: string
          maxLength: 3000
          pattern: '^(?!.*<script[^>]*>).*$'
        encryptedAuthToken:
          description: Encrypted Service Provider defined authorization token for the enrollment
          type: string
          maxLength: 3000
          pattern: '^(?!.*<script[^>]*>).*$'           
        integratorUUID:
          description: Unique value provided by the Marketplace integrator
          type: string
          maxLength: 3000
          pattern: '^(?!.*<script[^>]*>).*$'  
      minProperties: 1               

    AccountPickupGetResponse:
      description: Account Pickup GET response entity
      allOf:
        - $ref: "#/components/schemas/BaseResponse" 
        - type: object
          properties: 
            payload:
              description: Response payload - object containing the list of account pickup preferences
              type: array
              items: 
                required: 
                  - versionNumber
                  - accountNumber
                allOf:
                  - type: object
                    properties:
                      accountNumber:
                        $ref: "#/components/schemas/AccountNumber" 
                  - $ref: "#/components/schemas/VersionNumber" 
                  - $ref: "#/components/schemas/AccountPickupPreference"                  


    AccountPickupModifyResponse:
      description: Account Pickup Modify response entity
      allOf:
        - $ref: "#/components/schemas/BaseResponse" 
        - type: object
          properties: 
            payload:
              description: Response payload - object containing the list of account pickup preferences
              type: object
              required: 
                -  accountNumber
                -  versionNumber
              allOf:
                - type: object
                  properties:
                    accountNumber:
                      $ref: "#/components/schemas/AccountNumber"                
                - $ref: "#/components/schemas/VersionNumber" 
                - $ref: "#/components/schemas/AccountPickupPreference"                  


    AccountPickupPreference:
        description: Account Pickup preference entity
        type: object
        required: 
          - locale  
          - notificationIndicators 
        properties: 
          locale:
            description: Preferred locale for account pickup. Format follows <a href="https://www.iso.org/iso-639-language-code.html" target="_blank">ISO 639M</a> language code and region code combination.
            type: string
            maxLength: 5
            pattern: '^[a-z]{2}_[A-Z]{2}$'
            example: en_US
          emails:
            description: Emails associated with the account pickup preferences.
            type: array
            items:
              type: string
              format: email
          notificationIndicators:
            $ref: "#/components/schemas/NotificationIndicators"

    NotificationIndicators:
      type: object
      description: Notification indicators container. Notifications can be sent in email or/and SMS.
      properties:
        email:
          $ref: "#/components/schemas/CommonNotificationIndicators"
        sms:
          $ref: "#/components/schemas/CommonNotificationIndicators"


    CommonNotificationIndicators:
      description: Common notification indicators container.
      type: object
      required:
        - dayOfPickupInd
        - dayBeforePickupInd
        - preArrivalInd
        - pickupUpdateInd
        - pickupCompleteInd
        - pickupCancellationInd
        - enrollmentConfirmationInd
        - smartPickupCutOffNotificationTimeInd
        - smartPickupTriggerWarningInd
        - smartPickupTriggerNotificationInd
        - smartPickupTriggerCancellationInd
        - pickupIncompleteNotificationInd
        - pickupDelayedInd
      properties: 
        dayOfPickupInd:
          description: Indicates whether to send notifications on the day of pickup.
          type: boolean
          default: false
        dayBeforePickupInd:
          description: Indicates whether to send notifications on the day before pickup.
          type: boolean
          default: false
        preArrivalInd:
          description: Indicates whether to send notifications before arrival.
          type: boolean
          default: false
        pickupUpdateInd:
          description: Indicates whether to send notifications on pickup schedule update.
          type: boolean
          default: false    
        pickupCompleteInd:
          description: Indicates whether to send notifications on pickup completion.
          type: boolean
          default: false
        pickupCancellationInd:
          description: Indicates whether to send notifications on pickup cancellation.
          type: boolean
          default: false
        enrollmentConfirmationInd:
          description: Indicates enrollment confirmation
          type: boolean
          default: false
        smartPickupCutOffNotificationTimeInd:
          description: Indicates the Smart pickup cut off notification time
          type: boolean
          default: false
        smartPickupTriggerWarningInd:
          description: Indicates the Smart pickup trigger warning
          type: boolean
          default: false
        smartPickupTriggerNotificationInd:
          description: Indicates Smart pickup trigger notification
          type: boolean
          default: false
        smartPickupTriggerCancellationInd:
          description: Indicates Smart pickup trigger cancellation
          type: boolean
          default: false
        pickupIncompleteNotificationInd:
          description: Indicates incomplete pickup notification
          type: boolean
          default: false
        pickupDelayedInd:
          description: Indicates delayed pickup
          type: boolean
          default: false

    DeliveryChangeGetResponse:
      description: Delivery Change Preference GET Response Object
      allOf:
        - $ref: "#/components/schemas/BaseResponse" 
        - type: object
          properties: 
            payload:
              description: Response contains zero or one Delivery Change Preference entity
              type: array
              maxItems: 3
              items:
                required: 
                  -  docId
                allOf: 
                  - $ref: "#/components/schemas/BasePreference"
                  - $ref: "#/components/schemas/DeliveryChange"       

    DeliveryChangeModifiedResponse:
      description: Delivery Change Preference Response Object
      allOf:
        - $ref: "#/components/schemas/BaseResponse" 
        - type: object
          properties: 
            payload:
              description: Response payload - object containing zero or one Delivery Change Preference entity
              required: 
                -  docId
              allOf:
                - $ref: "#/components/schemas/BasePreference"                 
                - $ref: "#/components/schemas/DeliveryChange"
                
    DeliveryChange:
      description: Delivery Change preference entity. uapAddress and otherAddress are mutually exclusive.
      type: object
      required: 
        -  optionSelected
      properties:
        optionSelected:
          description: Delivery change option selected
          type: string
          example: RedirectToUAP
        uapAddress:
          $ref: "#/components/schemas/DeliveryChangeUAPAddress"
        otherAddress: 
          $ref: "#/components/schemas/DeliveryChangeOtherAddress"
        deliveryInstructions:
          $ref: "#/components/schemas/DeliveryInstructions"
        surePostUpgradeInd:
          description: Indicates whether the SurePost upgrade is enabled.
          type: boolean
          default: false
          example: true       

    DeliveryChangeUAPAddress:
      description: Access point address
      type: object 
      properties:
        uapId:
          description: UAP internal id that is associated to the access point the customer selected from the map
          type: string
          pattern: ^[a-zA-Z0-9]{1,15}$
          example: U87282
        name:
          description: Name
          type: string
          example: John Doe
        phone:
          description: Phone number
          type: string
          pattern: "^\\+?\\d{1,15}$"
          example: "+15555555555"
        phoneExt:
          description: Phone extension
          type: string
          pattern: "^\\d{1,4}$"
          example: "12"
        address:
          $ref: "#/components/schemas/AddressDetails"

    DeliveryChangeOtherAddress:
      description: Name and address for Leave with neighbor, deliver to another address, redeliver to my address
      type: object 
      properties:
        name:
          description: Name
          type: string
          example: John Doe
        address:
          $ref: "#/components/schemas/AddressDetails"

    AddressDetails:
      description: Address details
      type: object 
      properties:
        line1:
           description: Street number line 1
           type: string
           maxLength: 100
           example: 1234 Main St
        line2:
           description: Street number line 2
           type: string
           maxLength: 100
           example: Apt. 305
        line3:
           description: Street number line 3
           type: string
           maxLength: 100
           example: Suite 24
        municipalityName:
           description: Name of city/municipality.
           type: string
           maxLength: 100
           example: Atlanta
        stateProvinceCode:
           description: State/province code.
           type: string
           maxLength: 50
           example: GA
        postalCode:
           description: Postal code.
           type: string
           maxLength: 10
           example: "30303"
        countryCode:
           description: Country Code.
           type: string
           pattern: ^[a-zA-Z0-9]{2}$
           maxLength: 2
           example: US
        addressTypeCode:
           description: Code to indicate address type, eg. 01 - Residential, 02 - Commercial, 99 - Unspecified/Unclassified.
           type: string
           example: "01"

    DeliveryInstructions:
      description: Delivery instructions such as where to leave the package
      type: object 
      properties:
        leaveAtCd: 
            description: |
                Delivery Change (DCWA) event leave at instruction. Possible leave at instruction values
                | Code  | Description           |
                | :---: | :---                  | 
                | ML    | Front Door            | 
                | MM    | Rear Door             |
                | ZF    | Shed                  |
                | IV    | Vestibule             |
                | MP    | Garage                |
                | MQ    | Porch                 | 
                | M6    | Management Office     |
                | ZG    | Concierge             |
                | MR    | Deck                  |
                | M4    | Reception             |
                | MN    | Side Door             | 
                | ZH    | Superintendent        |
                | MS    | Patio                 |
                | IS    | Mail Room             |
                | M9    | Door Person           |
            
            type: string
            maxLength: 2
            example: ML
        accessCode: 
            description: Delivery change access code or gate code
            type: string
            pattern: ^[a-zA-Z0-9\-#]+$
            maxLength: 100
            example: "00110"
        specialInstruction: 
          description: Delivery change special instruction
          type: string
          pattern: '^(?!.*<script[^>]*>).*$'  
          maxLength: 100
          example: "Leave with neighbor on the left Side"

    SuccessResponseHeaders:
      description: The headers that are returned for all error responses.
      type: object
      required:
        - bkndtransid
      properties:
        bkndtransid:
          description: The backend transaction id.
          type: string    

    BackendErrorResponseHeaders:
      description: The headers that are returned from the backend and gateway
      required:        
        - bkndtransid
        - apierrorcode
        - apierrormsg      
      properties:
        bkndtransid:
          description: The backend transaction id.
          type: string
        apierrorcode:
          description: The API error code.
          type: string
          example: UJ0001
        apierrormsg:
          description: The API error message.
          type: string
          example: Invalid token or token is not present.
                    
    Error:
      description: Error entity
      type: object
      required: 
        -  code
        -  message
      properties: 
        code:
          description: error code
          type: string
          pattern: '^[a-zA-Z0-9\-_]+$'
          minLength: 3
        message:
          description: error message
          type: string
          minLength: 3
          pattern: '^[a-zA-Z0-9\-_\s:]+$'

    ResponseErrorsArr:
        description: Error response entity
        type: object
        required: 
          -  errors
        properties: 
          errors:
            description: error payload - array containing one or more Errors
            type: array
            items: 
              $ref: "#/components/schemas/Error"

    ErrorResponse:
      description: Response Object for error condition
      type: object
      properties: 
        response:
          $ref: "#/components/schemas/ResponseErrorsArr"
