            | :---: | :---                |
            | LT    | Laser Printer       |
            | TP    | UPS Thermal Printer |
          type: string
          pattern: "^[a-zA-Z0-9]*$"
          maxLength: 3
          example: "LT"
        labelsPerPage:
          description: Label per page
          type: string
          pattern: "^[0-9]*$"
          maxLength: 3
          example: "2"
        labelSize:
          description: Label size
          type: string
          pattern: "^[a-zA-Z0-9]*$"
          maxLength: 3
          example: "003"

    UIFSChargeDefaults:
      description: Container for charge related UIFS Preference
