        itemLength:
          description: Item length for rating.
          type: integer
          maxLength: 5     
        itemWidth:
          description: Item width for rating.
          type: integer
          maxLength: 5           
        shipmentItemType:
          description: Item type for shipment rating. LOO - loose items; PLT - Pallet
