              description: Response payload - object containing zero or one MyUPS entity
              anyOf: 
                - $ref: "#/components/schemas/MyUPS"
                - $ref: "#/components/schemas/TermsConditionsInfo"

    MyUPSResponse:
      description: MyUPS Response Object
      allOf:
        - $ref: "#/components/schemas/BaseResponse" 
        - type: object
          required: 
            -  payload
          properties: 
            payload:
              description: Response payload - object containing zero or one MyUPS entity
              $ref: "#/components/schemas/MyUPS"
      
    MyUPS:
      description: MyUPS preference entity
      type: object
      properties:
        dapPartnerIndicator:
          description: Indicates if the user is DAP partner.
          type: boolean
        employeeCountCode:
          description: |
            Code for employee count
            | Code | Description |
            | :---: | :--- |
            | 00 | Unclassified |
            | 01 | 1     |
            | 02 | 2-5   |
            | 03 | 6-10  |
            | 04 | 11-19 |
            | 05 | 20-49 |
            | 06 | 50-99 |
            | 07 | 100+  |
            | 09 | Data Not Available |
          type: string
          maxLength: 5       
        industrySegmentCode:
          description: |
            Code for industry segment (Part of the list as below)
            | Code | Description |
            | :---: | :--- |
            | 2000 | Diversified Vehicles & Parts |
            | 3000 | High Tech     |
            | 4000 | Industrial Manufacturing & Distribution   |
            | 5000 | Retail and Consumer Goods  |
            | 6000 | Professional Services |
            | 7000 | Consumer Services |
            | 8000 | Healthcare |
            | 9000 | Government  |
            | 9999 | Other |
          type: string
          maxLength: 8    
        jobFunctionCode:
          description: |
            Code for job function (Part of the list as below)
            | Code | Description |
            | :---: | :--- |
            | 00  | Select One |
            | ADA | Administrative Assistant     |
            | CEO | Chief Executive Officer   |
            | CFO | Chief Financial Officer  |
            | 41  | Chief Operating Officer |
            | CSM | Customer Service Manager |
            | OFM | Office Manager |
            | OPM | Operations Manager  |
            | OTH | Other  |
            | OWN | Owner |
            | PTR | Partner   |
            | PSD | President  |
            | SHM | Shipping Manager |
            | VPT | Vice President |     
            | WHM | Warehouse Manager |         
          type: string
          maxLength: 5  
        merchantHubEnrollmentStatusCode:
          description: |
            Status Code for merchant hub enrollment:
            | Code | Description |
            | :---: | :--- |
            | I  | Opt In  |
            | O  | Opt out |
            | U  | Unknown |            
          type: string
          maxLength: 1
          enum: 
            - "I"
            - "O"
            - "U"
        myChoiceStandardUserInd:
          description: Indicate if user is my choice standard user. 
          type: boolean
        personaCode:
          description: Persona code 
          type: string
          maxLength: 3            
        facebookID:
          description: User's facebook ID 
          maxLength: 100
          type: string   
        twitterHandle:
          description: User's twitter handle 
          maxLength: 100
          type: string  
        businessInd:
          description: Indicates if it's business account
          type: boolean  
        dropShipperPrivilege:
          description: Indicates if if account has drop shipping privilege
          type: boolean        
        adoCount:
          description: Automatic discount offer (ADO) count
          type: string
          maxLength: 10   
        adoTimestamp:
          description: Automatic discount offer (ADO) timestamp
          type: string
          format: date-time
        userPromotionIndicator:
          description: Indicates if promotion applies to user
          type: boolean
        worldShipMigrationText1:
          description: World Ship Migration Message 1 
          type: string
          maxLength: 250   
        worldShipMigrationText2:
          description: World Ship Migration Message 2 
          type: string
          maxLength: 250  
        emailVerification:
          description: Email verification information
          type: object
          properties: 
            status:
              description: Status of the user email verification X - Unknown, U - Unconfirmed, C - Confirmed, N - Need to confirm
              type: string
              maxLength: 1
              enum: 
                - X
                - U
                - C
                - N  
            pendingEmail:
              description: Pending email address for email change
              type: string
              format: email
            timestamp:
              description: Email verification timestamp
              type: string
              format: date-time          
        electronicMedia:
          description: Electronic media information
          type: object
          properties: 
            smsPhones:
              description: SMS phone information
              type: array
              maxItems: 3
              items: 
                type: object
                properties: 
                  phoneNumber:
                    description: Phone number
                    type: string
                    pattern: '^[0-9-]*$'
                    maxLength: 50
                    example: "4047832345"
                  countryCode:
                    description: Country code for the phone number. ISO 3166 alpha-2 is used.
                    type: string
                    pattern: '^[A-Z]{2}$'
                    maxLength: 2 
                    example: US
        systemConfigurations:
          description: User account configurations set by system for operational purpose.  
          type: object
          properties: 
            auth0MigrationIndicator:
              description: |
                System-level configuration to Indicate if a user account has been migrated to Auth0. 
                This is a temporary field to support account Auth0 migration. Deprecation of the field will be planned after Auth0 migration is complete (estimated as 2025). 
              type: boolean
              example: true
        displayBillingCenterIndicator:
          description: Indicates if the billing center should be displayed for the user.
          type: boolean
          default: false
          example: false
    TermsConditionsInfo:
      description: |
        MyUPS terms and conditions related information.
        TermsConditionsInfo section contains read-only properties which will only be included in the response when the request has include_additional_info specified.
      type: object
      properties:
        termsAndConditions:
          description: array of user level terms
          type: array
          items:
            type: object
            properties:
              type:
                description: Resource the terms and conditions apply to
                type: string
                minLength: 1
                maxLength: 50
                enum:
                  - mychoice
              version:
                description: Version of the terms and conditions.
                type: string
                example: v1.0
                minLength: 1
                maxLength: 20
              acceptanceDate:
                description: The <a href="https://www.rfc-editor.org/rfc/rfc3339#section-5.6" target="_blank">RFC 3339</a> date and time when the terms and conditions were accepted.
                type: string
                format: date-time
                minLength: 20
                maxLength: 24
                example: 2025-07-01T12:00:00Z
            required:
              - type
              - version
              - acceptanceDate
            additionalProperties: false
      required:
        - termsAndConditions
      additionalProperties: false

    UIFSResponse:
      description: UIFS Response Object
      allOf:
        - $ref: "#/components/schemas/BaseResponse" 
        - type: object
          properties: 
            payload:
              description: Response payload - object containing zero or one UIFS entity
              $ref: "#/components/schemas/UIFS"

    UIFS:
      description: UIFS preference entity
      type: object
      properties:
        serviceLevel:
          description: |
            Service level
            | Code | Description |
            | :---: | :--- |
            | 308 | UPS Freight LTL |
            | 309 | UPS Freight LTL Guaranteed |
            | 334 | UPS Freight LTL Guaranteed AM |
            | 349 | Standard LTL |
            | 003 | UPS Ground with Freight Pricing |
          type: string
          pattern: "^[a-zA-Z0-9]{3}$"
          maxLength: 3
          example: "309"
        ltlDestinationCountry:
          description: LTL (less than truckload) destination country
          $ref: "#/components/schemas/CountryCode"
        freightClassList:
          description: Freight Class List. UPS uses the National Motor Freight Classification.
          type: array
          maxItems: 10          
          items:
            type: string
            enum:
              - "50" 
              - "55"
              - "60"
              - "65"
              - "70"
              - "77.5"
              - "85"
              - "92.5"
              - "100"
              - "110"
              - "125"
              - "150"
              - "175"
              - "200"
              - "250"
              - "300"
              - "400"
              - "500"
        notifications:
          $ref: "#/components/schemas/UIFSEmailNotifications"
        densityBasedRating: 
          $ref: "#/components/schemas/UIFSDensityBasedRating"
        accessorialServices:
          $ref: "#/components/schemas/UIFSAccessorialServices"
        billOfLand:
          $ref: "#/components/schemas/UIFSBillOfLand"
        labels: 
          $ref: "#/components/schemas/UIFSLabels"
        chargeDefaults:
          $ref: "#/components/schemas/UIFSChargeDefaults"
        refValues1:
          description: |
            Reference values
            | Code | Description |
            | :---: | :--- |
            | PO | Purchase Order Number |
            | BM | Bill of Landing Number |
          type: string
          maxLength: 3
          example: "PO"
        refValues2:
          description: |
            Reference values
            | Code | Description |
            | :---: | :--- |
            | PO | Purchase Order Number |
            | BM | Bill of Landing Number |
          type: string
          maxLength: 3
          example: "BM"

    UIFSEmailNotifications:
      description: List of notification options for UIFS.
      type: object
      properties: 
        emails:
          type: array
          maxItems: 5
          items: 
            $ref: "#/components/schemas/UIFSEmailNotification"
        failureEmail:
          description: Failure Email
          type: string
          format: email
          example: johndoe@gmail.com      


    UIFSEmailNotification:
      description: Email notification preference for UIFS.
      type: object
      properties: 
        email:
          description: Email 
          type: string
          format: email
          example: johndoe@gmail.com
        shipNotificationInd:
          description: Indicates if sends ship Notification.
          type: boolean
        deliveryNotificationEmailInd:
          description: Indicates if sends delivery notification.
          type: boolean
        appointmentAttemptEmailInd:
          description: Indicates if sends appointment notification.
          type: boolean        

    UIFSDensityBasedRating:
      description: Container for density based rating of UIFS preference
      type: object
      properties: 
        numUnits:
          description: Number of units 
          type: string
          pattern: "^[0-9]*$"
          maxLength: 25
          example: "3"
        unitType:
          description: |
            Unit type
            | Code | Description |
            | :---: | :--- |
            | PLT | Pallet(s) |
            | TOT | Tote(s) |
            | SKD | Skid(s) |
            | CBY | Carboy(s) |
            | LOO | Loose items |
          type: string
          pattern: "^[a-zA-Z0-9]{3,25}$"
          maxLength: 25
          example: PLT
        length:
          description: Length
          type: string
          pattern: "^[0-9]*$"
          maxLength: 25
          example: "10"
        width:
          description: Width
          type: string
          pattern: "^[0-9]*$"
          maxLength: 25
          example: "5"
        height:
          description: Height
          type: string
          pattern: "^[0-9]*$"
          maxLength: 25
          example: "10"
        palletSkidHeight:
          description: Pallet skid height
          type: string
          pattern: "^[0-9]*$"
          maxLength: 25
          example: "20"
        measureUnits:
          description: |
            Measurement unit
            | Code | Description |
            | :---: | :--- |
            | IN | Inches |
            | CM | Centimeter |
          type: string
          pattern: "^[a-zA-Z]*$"
          maxLength: 25
          example: IN

    UIFSAccessorialServices:
      description: Additional services for UIFS
      type: object
      properties:
        pickup:
          $ref: "#/components/schemas/PickupOpts"
        delivery:
          $ref: "#/components/schemas/DeliveryOpts"

    PickupOpts:
      description: Options related to pickup.
      type: object
      properties: 
        pickupRequiredInd:
          description: Indicates if pickup is required.
        insideInd:
          description: Indicates if it's inside pickup.
          type: boolean
          maxLength: 1
        liftGateSrvOriginInd:
          description: Indicates if liftgate is required.
          type: boolean
          maxLength: 1
        residentInd: 
          description: Indicates if it's residential pickup.
          type: boolean
          maxLength: 1
        tradeShowInd:
          description: Indicates if it's trade show pickup.
          type: boolean
          maxLength: 1
        freezableProtectionInd:
          description: Indicates if freezable protection is needed.
          type: boolean
          maxLength: 1
        limitedAccessLocationInd: 
          description: Indicates if it's limited access location.
          type: boolean
          maxLength: 1
        extremeLengthInd: 
          description: Indicates if it's oversized item.
          type: boolean
          maxLength: 1

    DeliveryOpts:
      description: Options related to delivery.
      type: object
      properties: 
        insideInd:
          description: Indicates if it's inside delivery.
          type: boolean
          maxLength: 1
        liftGateSrvDestInd:
          description: Indicates if liftgate is required.
          type: boolean
        residentInd: 
          description: Indicates if it's residential delivery.
          type: boolean
          maxLength: 1
        tradeShowInd:
          description: Indicates if it's trade show delivery.
          type: boolean
          maxLength: 1
        limitedAccessLocationInd: 
          description: Indicates if it's limited access location.
          type: boolean
          maxLength: 1
        callBeforeDeliveryInd: 
          description: Indicates if it requires a call before delivery.
          type: boolean
          maxLength: 1
        sortSegregateInd:
          description: Indicates if sorting and segregation applies.
          type: boolean
          maxLength: 1
        numberSortSegregate:
          description: Sorting and segregation number.
          type: string
          maxLength: 3
          example: "999"
        codInd: 
          description: Indicates if COD (Cash on delivery) applies.
          type: boolean
          maxLength: 1
        codAmount:
          description: The amount for code.
          type: string
          pattern: '^((?!<script>).)*$'
          maxLength: 12
          example: "$50"

  
    UIFSBillOfLand:
      description: Bill of Land (BOL) container for UIFS preference
      type: object
      properties: 
        showShipmentWeightMessageInd:
          description: Indicates if includes shipment weight message.
          type: boolean
          default: true
        format:
          description: Preferred format "UPS Freight" and "VICS"
          type: string
          pattern: "^[a-zA-Z0-9-_. ]*$"
          maxLength: 25
          example: "UPS Freight"
        template:
          description: BOL template
          type: string
          pattern: '^((?!<script>).)*$'
          maxLength: 100
        printLabelInd: 
          description: Print Label
          type: boolean
          maxLength: 1
     
    UIFSLabels:
      description: Label container for UIFS Preference
