          maxLength: 100
        category:
          type: string
          maxLength: 100
        type:
          type: string
          example: delivery
          maxLength: 100
        tenantId:
          type: string
          example: dummyaccount1
          maxLength: 100
        date:
          type: string
          description: "Date for which the location timing override is being created. It has to be in ISO 8601 format (YYYY-MM-DD)."
        pickAndPack:
          type: integer
          format: int32
          description: "Approximate time duration (in minutes) that a location takes to pick-and-pack an order. Only required for timing type `pickup` and `delivery`."
        name:
          type: string
          description: "The name of the timing override."
          maxLength: 100
        isOpen:
          type: boolean
          description: "To mark whether location is open or closed for a given day."
        is24Hrs:
          type: boolean
          description: "To denote location is open 24hrs. This can be set to true for type `location` only."
        entity:
          type: string
          description: "It can be one value from `location`, `brand`, or `business`."
          enum:
            - location
            - brand
            - business
        hours:
          type: array
          description: "Array of Hour objects if is24Hrs flag is set to false. Required if opensAt, closesAt, and interval values are not set."
          items:
            type: object
            properties:
              opensAt:
                type: string
                description: "Required when `is24Hrs` under Day is marked as `false`. `opensAt` field takes 24-hour clock notation, e.g., `13:00`."
              closesAt:
                type: string
                description: "Required when `is24Hrs` under Day is marked as `false`. `closesAt` field takes 24-hour clock notation, e.g., `13:00`."
     
    DeleteTimingOverrideRequest:
      type: "object"
      required:
        - "dates"
        - "entity"
      properties:
        locationExternalIds:
          type: "array"
          description: "An array of location Ids for which timings are being created. This is required when entity is passed as `location`."
          items:
            type: "string"
        brandExternalIds:
          type: "array"
          description: "An array of brand Ids for which timings are being created. This is required when entity is passed as `brand`."
          items:
            type: "string"
          maxLength: 100
        category:
          type: "string"
          description: "Required if type is `pickup`, `delivery`, or `return`."
          maxLength: 100
        dates:
          type: "array"
          description: "The date for which the location timing override is to be deleted. It has to be in ISO 8601 format (YYYY-MM-DD)"
          items:
            type: "string"
        entity:
          type: "string"
          description: "It can be one value from `location`, `brand`, or `business`."
          enum:
            - "location"
            - "brand"
            - "business"

    Weight:
      type: object
      description: Weight of an item
      required:
        - value
        - unit
      properties:
        value:
          type: number
          format: double
          description: weight
          minimum: 0
        unit: 
          type: string
          description: units for given weight in kg or lb
          enum: 
            - kg
            - lb
  
    Size:
      type: object
      description: Dimensions of the item.
      required:
        - height
        - width
        - length
        - unit
      properties:
        height:
          type: number
          format: double
          description: Height
          minimum: 0
        width:
          type: number
          format: double
          description: Width
          minimum: 0
        length:
          type: number
          format: double
          description: Length
          minimum: 0
        unit: 
          type: string
          description: units for given size in cm or in
          enum: 
            - cm
            - in
          
    Item:
      type: object
      description: "Details of an item within a package"
      required:
        - sku
      properties:
        sku:
          type: string
          description: "An ID that identify the product/variant from the brand’s catalog."
          maxLength: 100
        upc:
          type: string
          description: "Universal Product Code for the item"
          maxLength: 100
        category:
          type: string
          description: "Category of Item"
          maxLength: 100
        quantity:
          type: integer
          format: int32
          description: "Number of items of the SKU"
          minimum: 1
        size:
          $ref: '#/components/schemas/Size'
        weight:
          $ref: '#/components/schemas/Weight'
        price:
          type: number
          format: double
          description: "Retail price of the item."
          minimum: 0
        salePrice:
          type: number
          format: double
          description: "Sale price of the item."
          minimum: 0
        image:
          type: string
          description: "Link to the image file of the item."
          maxLength: 200
        title:
          type: string
          description: "Title of the item."
          maxLength: 200
        description:
          type: string
          description: "Description of the item."
          maxLength: 10000
        itemAttributes:
          type: object
          description: "Custom item attributes."
        tags:
          type: array
          description: "Additional information related to the item."
          items:
            type: string
          minItems: 0
          maxItems: 20
    
    Package:
      type: object
      description: "Package Details"
      required:
        - name
      properties:
        name:
          type: string
          description: "Name of package created in our system, or pass the value 'custom'."
          default: "custom"
          maxLength: 100
        description:
          type: string
          description: "A brief description about the package contents."
          maxLength: 10000
        size:
          $ref: '#/components/schemas/Size'
        weight:
          $ref: '#/components/schemas/Weight'
        quantity:
          type: integer
          format: int32
          description: "Number of Packages"
          minimum: 1
        itemQuantity:
          type: integer
          format: int32
          description: "Number of items in a single package."
          minimum: 1
        itemList:
          type: array
          description: "Array of items in the package."
          items:
            $ref: '#/components/schemas/Item'
          maxItems: 1000
        temperatureControl:
          type: string
          description: "Temperature information of the package"
          enum:
            - frozen
            - refrigerated
            - cool
            - ambient
            - warm
            - none
        content:
          type: array
          description: "Content information of the package"
          items:
            type : string
            enum:
            - alcohol
            - fragile
            - tobacco
            - rx
            - perishable
        barcode:
          type: string
          description: "Barcode sent to the provider for scanning the packages"
          default: "null"
          maxLength: 500
    
    AlternateLocationRequest:
      type: object
      required:
        - deliveryAddress
      properties:
        locationExternalId:
          type: string
          description: "Location Id for which the order is being placed."
          maxLength: 100
        deliveryAddress:
          $ref: '#/components/schemas/Address'
        packages:
          type: array
          description: "Package Details"
          items:
            $ref: '#/components/schemas/Package'
        type:
          type: string
          description: "Type of order. Options are 'delivery', 'pickup', or 'shipping'."
        matchProviderTags:
          type: array
          description: "Alternate locations for providers matching at least one tag from the requested tags."
          items:
            type: string
    
    AlternateLocationResponse:
      type: array
      items:
        type: object
        properties:
          provider:
            type: string
            example: "UPS"
            maxLength: 100
          address:
            $ref: '#/components/schemas/Address'
          providerLocationId:
            type: string
            example: "179140"
            maxLength: 100
          distance:
            type: number
            example: 11.1
            default: 0
          locationTimings:
            type: array
            items:
              type: string
              example: "Mon-Sat: 9:00am-8:00pm"
          serviceType:
            type: string
            example: "UPS Access Point"
            maxLength: 100
          type:
            type: string
            example: "drop-off-point"
            maxLength: 100
          providerLocationInfo:
            type: array
            items:
              type: string
              example: "CHEMIST'S"
          name:
            type: string
            example: "CVS STORE # 6931"
            maxLength: 100
          phone:
            type: string
            example: ""
            maxLength: 20
          providerTags:
            type: array
            items:
              type: string
              example: "providerTag-1"
      
    ErrorDetail:
      type: object
      required: 
        -  type
        -  message
      properties:
        type:
          type: string
        message:
          type: string
        parameter:
          type: 
            - string
            - 'null'
        entityId:
          type: 
            - string
            - 'null'
        entity:
          type: 
            - string
            - 'null'

    InvalidRequest:
      type: object
      properties:
        type:
          type: string
          example: "ERROR_TYPE"
        message:
          type: string
          example: "An error occurred" 
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'

    UPSErrorResponse:
      type: object
      properties:
        response:
           $ref: '#/components/schemas/Response'
    
    Response:
      type: object
      properties:
          errors:
            type: array
            description: The error response containing any errors that occurred.
            items:
                $ref: '#/components/schemas/ErrorMessage'
    
    ErrorMessage:
      type: object
      properties:
        code:
          type: string
          description: The error code.
          example: VSS300
        message:
          type: string
          description: The error message.
          example: Locale is required. The Subscription request has been rejected.
      description: The error response containing any errors that occurred