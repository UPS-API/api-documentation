tags:
  - name: "Location Management"
    description: "A pickup location denotes an operational unit of a business with a physical address from which a delivery partner or a customer can pick up the order"
  - name: "Timings"
    description: "Time is a critical factor for operations and customer experience. In-store, pick-up and delivery experience revolve around proper expectation setting of time - both for the store operations team, and the customer."
  - name: "Timings-Override"
    description: " Timing Overrides are used when a location wants to operate during special hours or it is closed for a particular day. For example, consider if a location is not operational on Thanksgiving day, they can create an override for that day. A particular override is valid for the mentioned dates"
  - name: "Alternate-Location"
    description: "These are dropoff locations made available by providers. For example, providers like FedEx, UPS provide a standard set of pickup locations where they can deliver to, instead of the customer’s address."
  - name: "Boundary"
    description: "A boundary illustrates the service coverage for the Pickup Location by the business. This covers both In-Service and Out-of-Service coverage areas."
servers:
  - url: https://api.lynkup.com/location/{version}
    description: Integration hub Production OAuth.
    variables:
      version:
        default: v1
        enum:
         - v1
  - url: 'https://sanbox.api.lynkup.com/location/{version}'
    description: Integration hub Sandbox Production OAuth.
    variables:
      version:
       default: v1
       enum:
          - v1

security:
  - OAuth2ClientCredentials: []

paths:
  /locations:
    post:
      summary: Create Locations
      description: | 
         A Pickup Location represents a physical place within a business, such as a store, warehouse, or distribution center, where a delivery partner or customer can collect an order. Each pickup location is assigned a unique `locationExternalId` used across the system to identify and manage specific locations in various API operations. During creation, you can assign multiple providers to a pickup location, allowing flexibility in managing delivery options.

         Use this API to create, update, retrieve, or delete pickup locations as needed, ensuring that each location is uniquely identifiable and accurately represented for operational purposes.
      operationId: createLocation
      tags:
        - Location Management
      security:
        - OAuth2ClientCredentials: []
      parameters:
        - name: version
          in: path
          description: version
          required: true
          schema:
            type: string
            default: v1
            enum:
                - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Location'
            examples:
              Required Fields Only:
                value:
                  name: Excellent Location
                  locationExternalId: '152946'
                  contact:
                    name: Location Manager
                    phone: '+1-214-234-2232'
                  address:
                    street1: 6615 Meadowbrook Dr
                    city: Fort Worth
                    state: TX
                    postalCode: '76112'
                    countryCode: US
              All Fields Filled:
                value:
                  name: Great Location
                  locationExternalId: '152950'
                  brandExternalId: devon
                  contact:
                    name: Location Manager
                    phone: '+1-214-234-2232'
                  address:
                    street1: 5510 S I-35 Frontage Rd
                    city: Austin
                    state: TX
                    postalCode: '78745'
                    countryCode: US
                  active: true
                  currencyCode: USD
                  pickupInstructions: Park in the designated parking area, and come to the customer support desk
                  returnLocationId: '152946'
                  providers:
                    - name: DoorDash
                    - name: FedEx
                  providerAttributes:
                    FedEx:
                      accountNumber: test-account-number
                      returnStoreService: FEDEX_GROUND
      responses:
        '201':
          description: Successful operation
          content: 
            application/json:
               schema:
                 $ref: '#/components/schemas/LocationResponse'
               examples:
                 Response for Required Fields Only Request: 
                   value:
                    id: "23232"
                    tenantId: "dummyaccount1"
                    active: true
                    name: "Excellent Location"
                    locationExternalId: "152946"
                    contact:
                      name: Location Manager
                      phone: '+1-214-234-2232'
                    address:
                      street1: 6615 Meadowbrook Dr
                      city: Fort Worth
                      state: TX
                      postalCode: '76112'
                      countryCode: US
                    timeZone: "America/Chicago"
                    createdAt: "2022-04-26T03:03:30.559Z"
                    lastUpdatedAt: "2022-04-26T03:03:30.559Z"
                 Response for All Fields Filled Request :
                   value:
                    id: "232323"
                    tenantId: "dummyaccount1"
                    active: true
                    name: Great Location
                    locationExternalId: '152950'
                    brandExternalId: devon
                    contact:
                      name: Location Manager
                      phone: '+1-214-234-2232'
                    address:
                     street1: 5510 S I-35 Frontage Rd
                     city: Austin
                     state: TX
                     postalCode: '78745'
                     countryCode: US
                    currencyCode: USD
                    pickupInstructions: Park in the designated parking area, and come to the customer support desk
                    returnLocationId: '152946'
                    providers:
                     - name: DoorDash
                     - name: FedEx
                    providerAttributes:
                     FedEx:
                      accountNumber: test-account-number
                      returnStoreService: FEDEX_GROUND
                    timeZone: "America/Chicago"
                    createdAt: "2022-04-26T03:03:30.559Z"
                    lastUpdatedAt: "2022-04-26T03:03:30.559Z"
        "422":
          description: "Processing failed as request contains invalid data"
          headers: 
            apierrorcode:  
              required: true
              description: 'The API error code'
              schema: 
                type: string 
            apierrormsg:  
              required: true
              description: 'The API error message.'
              schema: 
                type: string 
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/InvalidRequest'
              examples:
                Bad Request - Duplicate location ID:
                  value:
                    errors:
                      - type: "DUPLICATE_ID"
                        message: "LocationID with id, 152950, already exists"
                        parameter: locationExternalId
                        entityId: "152950"
                        entity: location
                    type: "DUPLICATE_ID"
                    message: "LocationID with id, 152950, already exists"
                Bad Request - Provider not configured:
                  value:
                    errors:
                    - type: "NOT_FOUND"
                      message: "Walmart GoLocal DSP is not configure in system"
                      parameter: null
                      entityId: null
                      entity: null
                    type: "NOT_FOUND"
                    message: "Walmart GoLocal DSP is not configure in system"
        "400":
          description: "Bad Request"
