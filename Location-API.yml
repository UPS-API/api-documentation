            type: string
        brandExternalIds:
          type: array
          description: "An array of location IDs for which timings are being created. Required when entity is passed as `brand`."
          items:
            type: string
        category:
          type: string
          description: "Required if type is `pickup` or `delivery`."
          maxLength: 100
        entity:
          type: string
          description: "Can be one value from `location`, `brand`, or `business`."
          enum:
            - location
            - brand
            - business     
    
    TimingsOverrideRequest:
      type: object
      required:
        - name
        - dates
        - isOpen
        - is24Hrs
        - entity
      properties:
        locationExternalIds:
          type: array
          items: 
            type: string
            description: "An array of location Ids for which timings are being created. This is required when entity is passed as `location`."
        brandExternalIds:
          type: array
          items: 
            type: string
          description: "An array of brand Ids for which timings are being created. This is required when entity is passed as `brand`."
        categories:
          type: array
          description: "Required if type is `pickup`, `delivery`, or `return`."
          items:
            type: string
        pickAndPack:
          type: integer
          format: int32
          description: "Approximate time duration (in minutes) that a location takes to pick-and-pack an order. Only required for timing type `pickup` and `delivery`."
        name:
          type: string
          description: "The name of the timing override."
          maxLength: 100
        dates:
          type: array
          description: "Dates for which the location timing override is being created. It has to be in ISO 8601 format (YYYY-MM-DD)."
          items:
            type: string
        isOpen:
          type: boolean
          description: "To mark whether location is open or closed for a given day."
        is24Hrs:
          type: boolean
          description: "To denote location is open 24hrs. This can be set to true for type `location` only."
        capacity:
           type: number
           minimum: 0
        fee: 
          type: number
          minimum: 0
        entity:
          type: string
          description: "It can be one value from `location`, `brand`, or `business`."
          enum:
            - location
            - brand
            - business
        opensAt:
          type: string
          description: "location opening time. Required if hours value is not set and isOpen flag is set to true."
        closesAt:
          type: string
          description: "location closing time. Required if hours value is not set and isOpen flag is set to true."
        interval:
          type: integer
          format: int32
          description: "Interval between consecutive location operation hours. Required if hours value is not set and isOpen flag is set to true."
        hours:
          type: array
          description: "Array of Hour objects if is24Hrs flag is set to false. Required if opensAt, closesAt, and interval values are not set."
          items:
            type: object
            properties:
