components:
  securitySchemes:
    OAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          x-tokenEndpointAuthMethod: client_secret_basic
          tokenUrl: https://api.lynkup.com/ent-services/security/v1/oauth/token
          scopes: {}
  
  schemas: 
    Location:
      type: object
      required: 
        -  locationExternalId
        -  name
        -  address
        -  contact
      properties:
        name :
          type: string
          description: Name of the location
          maxLength: 100
        description:
          type: string
          description: description for location
          maxLength: 10000
        locationExternalId:
          type: string
          maxLength: 100
          description: It's a unique id by which your systems can identify the location. It's not editable after the creation of Location.
        brandExternalId:
          type: string
          maxLength: 100
          description: It's a unique id that you have associated with the brand during its creation. If not provided, the default brand is chosen.
        contact:
          $ref: '#/components/schemas/Contact'
        address:
          $ref: '#/components/schemas/Address'
        active:
          type: boolean
          description: The location can be marked as active or inactive using the true/false flag. Default is true (location is enabled).
        currencyCode:
          type: string
          maxLength: 3
          description: Currency code in ISO 4217 alphabetical format, e.g. USD. It inherits from Brand or Business if not provided.
        pickupInstructions:
          type: string
          maxLength: 10000
          description: Pickup instruction for the location. These instruction are given to drivers/customers coming to pick up the order. If not provided it will be inherited from Brand or Business.
        returnLocationId:
          type: string
          maxLength: 100
          description: In the case of shipping carriers, if the order can't be delivered then it's returned to the same Location. You can associate a different Location in such a case by entering the desired location's locationExternalId here.
        providers:
          type: array
          description: List of the providers that should be assigned for the location.
          items:
            type: object
            properties:
              name:
                type: string
                description: Provider Name
              providerId:
                type: string
        providerAttributes:
          type: object
          description: Dependent on provider attributes e.g., providerLocationId.
        tags:
          type: array
          description: Identifiers that can be used for finding and sorting relevant information.
          items:
            type: string

    LocationPutRequest:
      type: object
      properties:
        name :
          type: string
          maxLength: 100
          description: Name of the location
        description:
          type: string
          maxLength: 1000
          description: description for location
        locationExternalId:
          type: string
          maxLength: 100
          description: It's a unique id by which your systems can identify the location. It's not editable after the creation of Location.
        brandExternalId:
          type: string
          maxLength: 100
          description: It's a unique id that you have associated with the brand during its creation. If not provided, the default brand is chosen.
        contact:
          $ref: '#/components/schemas/Contact'
        address:
          $ref: '#/components/schemas/Address'
        active:
          type: boolean
          description: The location can be marked as active or inactive using the true/false flag. Default is true (location is enabled).
        currencyCode:
          type: string
          maxLength: 3
          description: Currency code in ISO 4217 alphabetical format, e.g. USD. It inherits from Brand or Business if not provided.
        pickupInstructions:
          type: string
          maxLength: 10000
          description: Pickup instruction for the location. These instruction are given to drivers/customers coming to pick up the order. If not provided it will be inherited from Brand or Business.
        returnLocationId:
          type: string
          maxLength: 100
          description: In the case of shipping carriers, if the order can't be delivered then it's returned to the same Location. You can associate a different Location in such a case by entering the desired location's locationExternalId here.
        providers:
          type: array
          description: List of the providers that should be assigned for the location.
          items:
            type: object
            properties:
              name:
                type: string
                description: Provider Name
              providerId:
                type: string
        providerAttributes:
          type: object
          description: Dependent on provider attributes e.g., providerLocationId.
        tags:
          type: array
          description: Identifiers that can be used for finding and sorting relevant information.
          items:
            type: string
        
    Address:
      type: object
      description: Address of the location
      required:
        - street1
        - city
        - state
        - postalCode
      properties:
        street1:
          type: string
          maxLength: 100
          description: Address Line 1 (Street Number and Street Name)
        street2:
          type: string
          maxLength: 100
          description: Address Line 2 (not to be used for apartment / suite #)
        apartmentNumber:
          type: string
          maxLength: 50
          description: Apartment / Suite #
        city:
          type: string
          maxLength: 100
          description: City
        state:
          type: string
          maxLength: 100
          description: State
        postalCode:
          type: string
          maxLength: 20
          description: Postal code or zip.
        countryCode:
          type: string
          description: 2-letter country code in ISO 3166-1 alpha-2 format. If not provided defaults to 'US'.
          default: US
          enum: 
            - US
            - CA
            - GB
            - AU
            - IE
        latitude:
          type: number
          format: double
          description: Latitude coordinates of the address
        longitude:
          type: number
          format: double
          description: Longitude coordinates of the address

    SuccessResponse:
      type: object
      properties:
        message:
          type: string

    Contact:
      type: object
      required:
        - name
        - phone
      description: Contact information.
      properties:
        name:
          type: string
          description: First Name of Contact
          maxLength: 100
        phone:
          type: string
          description: Phone Number of the Contact
          maxLength: 20
        email:
          type: string
          description: Email address of the Contact 
          maxLength: 100       

    LocationResponse:
      type: object
      required:
         -  locationExternalId
         -  name
         -  address
         -  contact
      properties:
        id:
          type: string
          example: "62668d60b02fd680c7071e39"
          maxLength: 100
        returnLocationId:
          type: string
          example: "dummyaccount1"
          maxLength: 100
        tenantId:
          type: string
          example: "dummyaccount1"
          maxLength: 100
        active:
          type: boolean
          example: true
          default: true
        name:
          type: string
          example: "Great Location"
          maxLength: 100
        locationExternalId:
          type: string
          example: "152950"
          maxLength: 100
        brandExternalId:
          type: string
          maxLength: 100
          example: "devon"
        contact:
          $ref: '#/components/schemas/Contact'
        address:
          $ref: '#/components/schemas/Address'
        description:
          type: string
          maxLength: 1000
          example: "Great location in Austin, Texas"
        pickupInstructions:
          type: string
          maxLength: 10000
          example: "Park in the designated parking area, and come to the customer support desk"
        currencyCode:
          type: string
          example: "USD"
          maxLength: 3
        timeZone:
          type: string
          example: "America/Chicago"
        createdAt:
          type: string
          example: "2022-04-26T03:03:30.559Z"
        lastUpdatedAt:
          type: string
          example: "2022-04-26T03:03:30.559Z"
        isDeleted:
          type: boolean
          example: false
          default: true
        isTemporary:
          type: boolean
          example: false
          default: true
        providers:
          type: array
          description: List of the providers that should be assigned for the location.
          items:
            type: object
            properties:
              name:
                type: string
                description: Provider Name
              providerId:
                type: string
        providerAttributes:
          type: object
          description: Dependent on provider attributes e.g., providerLocationId.
        atRisk:
          type: object
          properties:
            isCorporateAtRisk:
              type: boolean
              example: true
              default: true
        tags:
          type: array
          items:
            type: string
            example: "big&bulky"

    Boundary:
      type: object 
      properties:
        id:
          type: string
          description: Delivery Solutions' generated unique ID for the boundary.
          maxLength: 100
        locationExternalId:
          type: string
          maxLength: 100
          description: ID of the pickup location to which the boundary is associated with.
        shape:
          type: string
          enum: [polygon, circle, postal-code, address, driving-distance]
          description: Shape of a boundary.
        latitude:
          type: 
            - number
            - 'null'
          description: The latitudinal point of a boundary.
        longitude:
          type: 
            - number
            - 'null'
          description: The longitudinal point of a boundary.
        address:
          type: 
            - string
            - 'null'
          description: The address which acts as the center-point of a boundary, for shape address.
        radius:
          type: 
            - number
            - 'null'
          description: The radius of a boundary in miles, for shape circle, address, or driving-distance.
        status:
          type: string
          enum: [active, inactive]
          description: A boundary can be either active or inactive.
        name:
          type: string
          maxLength: 100
          description: The name given to the boundary.
        type:
          type: string
          enum: [in-service, out-of-service]
          description: A boundary can be either of type in-service or out-of-service.
        postalCode:
          type: 
            - string
            - 'null'
          maxLength: 20
          description: For boundary shape postal code, it covers the entire area of the assigned postalcode.
        tags:
          type: array
          items:
            type: string
          description: The boundary tags assigned to the boundary.
        boundary:
          type: array
          items:
            type: object
            properties:
              latitude:
                type: number     
              longitude:
                type: number
                description: Longitude point of the boundary.
          description: Each object contains two keys, latitude and longitude, which have a number value. This contains the points of the boundary, which in its entirety forms the boundary.
   
    BoundaryRequest:
      type: object
      properties:
        status:
          type: string
          enum: [active, inactive]
          description: Status of the boundary, either active or inactive.
        boundaries:
          type: array
          minLength: 1
          maxLength: 10
          items:
            type: object
            properties:
              name:
                type: string
                maxLength: 100
                description: Name of the boundary
              locationExternalId:
                type: string
                maxLength: 100
                description: Unique external, customer defined id
              shape:
                type: string
                enum: [postal-code, polygon, address, circle, driving-distance]
                description: Shape of the boundary
              type:
                type: string
                enum: [in-service, out-of-service]
                description: Specify whether this boundary is to be considered for service or out-of-service
              tags:
                type: array
                items: 
                  type: string
              radius:
                type: number
                format: double
                description: Specifies the radius of coverage in miles. Required only if the shape is circle, address or driving-distance
              address:
                $ref: "#/components/schemas/Address"
              postalCode:
                type: string
                maxLength: 20
                description: Required only if the shape is post
              boundary:
                type: array
                maxLength: 10000
                items:
                  type: object
                  properties:
                    latitude:
                      type: number
                      format: double                
                    longitude:
                      type: number
                      format: double
      required:
        - status
        - boundaries
    
    TimingsRequest:
      type: object
      required:
        - timings
        - entity
      properties:
        locationExternalIds:
          type: array
          description: An array of location Ids for which timings are being created. This is required when entity is passed as `location`.
          items:
            type: string
        brandExternalIds:
          type: array
          description: An array of location Ids for which timings are being created. This is required when entity is passed as `brand`.
          items:
            type: string
        category:
          type: string
          description: Required if `type` is `pickup`, `delivery` or `return`
          maxLength: 100
        timings:
          type: object
          description: Base timings for each day of the week.
          properties:
            Su:
              $ref: '#/components/schemas/DayTiming'
            Mo:
              $ref: '#/components/schemas/DayTiming'
            Tu:
              $ref: '#/components/schemas/DayTiming'
            We:
              $ref: '#/components/schemas/DayTiming'
            Th:
              $ref: '#/components/schemas/DayTiming'
            Fr:
              $ref: '#/components/schemas/DayTiming'
            Sa:
              $ref: '#/components/schemas/DayTiming'

        pickAndPack:
          type: integer
          description: Approximate time duration (in minutes) that a location takes to pick-and-pack an order.
          format: int32
        entity:
          type: string
          description: It can be one value from location, brand or business.
          enum:
            - location
            - brand
            - business

    TimingsResponse:
      type: object
      properties:
        id:
          type: string
          example: "62668d60b02fd680c7071e39"
          maxLength: 100
        locationExternalId:
          type: string
          example: "100983"
          maxLength: 100
        category:
          type: string
          description: Required if `type` is `pickup`, `delivery` or `return`
          maxLength: 100
        tenantId:
          type: string
          example: "dummyaccount1"
          maxLength: 100
        type:
          type: string
          example: "delivery"
          maxLength: 100
        lastUpdatedAt:
          type: string
          format: date-time
          example: "2022-04-25T12:12:58.223Z"
        timings:
          type: object
          description: Base timings for each day of the week.
          properties:
            Su:
              $ref: '#/components/schemas/DayTiming'
            Mo:
              $ref: '#/components/schemas/DayTiming'
            Tu:
              $ref: '#/components/schemas/DayTiming'
            We:
              $ref: '#/components/schemas/DayTiming'
            Th:
              $ref: '#/components/schemas/DayTiming'
            Fr:
              $ref: '#/components/schemas/DayTiming'
            Sa:
              $ref: '#/components/schemas/DayTiming'

        pickAndPack:
          type: integer
          description: Approximate time duration (in minutes) that a location takes to pick-and-pack an order.
          format: int32
        entity:
          type: string
          description: It can be one value from location, brand or business.
          enum:
            - location
            - brand
            - business
  
    DayTiming:
      type: object
      required:
        - isOpen
        - is24Hrs
      properties:
        isOpen:
          type: boolean
          description: Set `true` to indicate location as `open` and `false` for closed.
          default: true
        is24Hrs:
          type: boolean
          description: Set `true` to indicate location open for 24hrs. This field only applicable for type `location`.
          default: true
        opensAt:
          type: string
        closesAt:
          type: string
        interval:
          type: integer
        hours:
          type: array
          items:
            type: object
            properties:
              capacity:
                type: number
              fee: 
                type: number
              opensAt:
                type: string
                description: Required when `is24Hrs` under Day is marked as `false`. `opensAt` field takes 24hrs clock notation E.g., `13:00`.
              closesAt:
                type: string
                description: Required when `is24Hrs` under Day is marked as `false`. `closesAt` field takes 24hrs clock notation E.g., `13:00`.

    DeleteTimingRequest:
      type: object
      required:
        - entity
      properties:
        locationExternalIds:
          type: array
          description: "An array of location IDs for which timings are being created. Required when entity is passed as `location`."
