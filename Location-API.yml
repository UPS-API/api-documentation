  /boundaries/{boundary_id}:
    get:
      summary: Get Boundary Details
      operationId: getBoundaryById
      description: |
         A boundary defines the service coverage area for a pickup location, illustrating the in-service and out-of-service zones for deliveries. The hierarchy is structured as follows: Account -> Business -> Brand -> Pickup Location -> Order.
         Boundaries allow businesses to specify service coverage independently of delivery service providers (DSPs), enabling flexibility in managing service areas.

         Each boundary can include a coverage map represented by polygons, radius, postal codes, or specific addresses. Multiple boundaries can be added to a single location. Optional tags can also be added to a boundary to assist with order orchestration. Boundaries are used in Delivery Availability (DA) checks and order creation to verify service coverage for a given location.
      tags: 
        - Location Management
      security:
        - OAuth2ClientCredentials: []
      parameters: 
        - name: version
          in: path
          description: version
          required: true
          schema:
            type: string
            default: v1
            enum:
                - v1
        - name: boundary_id
          in: path
          required: true
          description: A unique numeric id for the boundary being fetched
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Successful response with boundary data
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Returns success or failure.
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Boundary'
              examples:
                polygonBoundary:
                  value:
                    message: "success"
                    data:
                      - id: "819745"
                        locationExternalId: "100983"
                        shape: "polygon"
                        latitude: null
                        longitude: null
                        type: "in-service"
                        address: null
                        radius: null
                        name: "Polygon Boundary 1"
                        status: "inactive"
                        postalCode: null
                        tags:
                          - "sdd"
                        boundary:
                          - latitude: 32.88017791805594
                            longitude: -96.599225289648
                          - latitude: 32.72781162864238
                            longitude: -96.928815133398
                          - latitude: 33.013859729261135
                            longitude: -96.82581830722613
                          - latitude: 32.94934892068774
                            longitude: -96.61982465488238
                          - latitude: 32.88017791805594
                            longitude: -96.599225289648
                postalCodeBoundary:
                  value:
                    message: "success"
                    data:
                      - id: "819748"
                        locationExternalId: "100983"
                        shape: "postal-code"
                        latitude: 33.0243206
                        longitude: -96.6745042
                        address: null
                        radius: null
                        status: "active"
                        name: "Postal code 75074 Boundary"
