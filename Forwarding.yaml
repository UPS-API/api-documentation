                shipmentNumber: "9100010271"
                serviceType: AM
                paymentType: PPD
                pickupDate: 2025-04-24
                readyTime: 09:15:59
                closeTime: 17:02:59
                dropoffTime: 18:00:00
                weight: 54
                freightType: PALLET
                isMetric: false
                orderDescription: Shipment of electronics
                shipperReference: SHIP123
                consigneeReference: CON123
                currencyCode: USD
                requestPickup: true
                requestBoL: true
                countryOfManufacture:
                  - US
                  - MX
                  - CA
                items:
                  - description: Laptop
                    count: 1
                    length: 15
                    width: 10
                    height: 1
                    weight: 5
                    details:
                      - key: serialNumber
                        value: SN654321
                  - description: Monitor
                    count: 1
                    length: 24
                    width: 18
                    height: 5
                    weight: 15
                    details:
                      - key: serialNumber
                        value: SN654321
                details:
                  - key: IsHazMat
                    value: "false"
                  - key: IsHazMatPassengerAircraft
                    value: "false"
                  - key: HAZMAT-Instruction
                    value: "Instruction"
                  - key: IsHAPU
                    value: "false"
                  - key: ContactName
                    value: "Michael"
                  - key: ContactPhone
                    value: "+1-1111111"
                  - key: IsSaturdayPickup
                    value: "false"
                  - key: IsCustomsClearance
                    value: "false"
                  - key: DeclaredValue
                    value: "1000"
                  - key: DeclaredValueCurrencyCode
                    value: USD
                  - key: CustomsValue
                    value: "1000"
                  - key: CustomsValueCurrencyCode
                    value: USD
                  - key: PICKUP
                    value: "false"             
										   
								  
