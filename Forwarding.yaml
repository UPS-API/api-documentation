          example: "2024-12-24T00:00:00Z"
        validity:
          type: integer
          description: Validity period of the shipment in days.
          example: 7
        portOfLoad:
          type: 
            - string
            - "null"
          description: Port of load for the shipment.
          example: "DEP01"
        portOfDischarge:
          type: 
            - string
            - "null"
          description: Port of discharge for the shipment.
          example: "USP0B"
        createdDate:
          type: string
          format: date-time
          description: Date and time when the shipment was created.
          example: "2024-12-17T05:19:25.7966667Z"
        incoTermType:
          type: 
            - string
            - "null"
          description: Incoterms type specifying the terms of trade.
          example: "DAP"
        originPort:
          $ref: "#/components/schemas/PortInfo"
        destinationPort:
          $ref: "#/components/schemas/PortInfo"
        paymentTerm:
          $ref: "#/components/schemas/PaymentTerm"
        partyDetails:
          type: array
          description: Collection of party details associated with the shipment.
          items:
            $ref: "#/components/schemas/PartyDetail"
        cargoDetails:
          $ref: "#/components/schemas/CargoDetails"
        pickupDetail:
          $ref: "#/components/schemas/PickupDetail"
        chargeDetails:
          type: array
          description: Collection of charge details associated with the shipment.
          items:
            $ref: "#/components/schemas/ChargeDetailV1"
    PartyDetail:
      type: object
