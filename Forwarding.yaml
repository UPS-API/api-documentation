  /shipments:
    patch:
      summary: Submit Order Shipments
      operationId: submitAirShipment
      tags:
        - Forwarding
      description: Processes all shipments created for a specific shipper during the day and returns a manifest.
      parameters:
        - $ref: "#/components/parameters/transId"
        - $ref: "#/components/parameters/transactionSrc"
        - $ref: "#/components/parameters/Content-Type"
        - $ref: "#/components/parameters/X-BusinessGUID"
        - $ref: "#/components/parameters/X-ClientId"
        - name: shipper_account_number
          in: query
          description: Unique shipper number. Required for all updates.
          required: true
          schema:
            type: string
            example: "123456789"
            maxLength: 9
        - name: pickup_date
          in: query
          description: The <a href="https://www.rfc-editor.org/rfc/rfc3339#section-5.6" target="_blank">RFC 3339</a> scheduled pickup date.
          required: false
          schema:           
            $ref: "#/components/schemas/ApolloDateV1"
        - name: request_manifest
          in: query
          description: The flag indicating whether a manifest should be generated.
          required: false
          schema:
            type: boolean
            example: true
            default: true
        - name: manifest_format
          in: query
          description: The format of the manifest to be generated. 
          required: false
          schema:
            type: string
            example: "PDF"
            default: "PDF"
            enum: 
              - "DATA"
              - "PDF"
      requestBody:
        required: true
        description: The request containing required details for processing submit request.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApolloPatchReplaceReqV1"
            example:
              - op: replace
                path: /status
                value: submitted
      responses:
        "200":
          description: OK
          headers:
            BkndTransId:
              $ref: "#/components/headers/BkndTransId"
            transId:
              $ref: "#/components/headers/transId"
            transactionSrc:
              $ref: "#/components/headers/transactionSrc"
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            X-BusinessGUID:
              $ref: "#/components/headers/X-BusinessGUID"
            X-ClientId:
              $ref: "#/components/headers/X-ClientId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApolloAirShipmentDataResponseV1"
              example: &response200ManifestPdf
                response:
                  account: "0009XXXXX"
