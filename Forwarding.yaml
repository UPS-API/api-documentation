          example: "ShipmentConfirmed"
        serviceLine:
          type: string
          description: Service line associated with the shipment.
          example: "LCL"
        serviceType:
          type: string
          enum: 
                - CAD
                - AM
                - D2G
                - D2
                - DFG
                - DF
                - CX
                - CA
                - EC
                - PF
                - PA
                - EL
                - SA
          description: Type of service being represented.
          example: "PF"
        serviceGroup:
          type: 
            - string
            - "null"
          description: Service group associated with the shipment.
        movementType:
          type: string
          enum: 
                - DTD
                - DTP
                - PTD
                - PTP
          description: Movement type of the shipment.
          example: "DTD"
        movementTypeCode:
          type: 
            - string
            - "null"
          enum: 
                - DTD
                - DTA
                - ATD
                - ATA
          description: Movement type code of the shipment.
        rateType:
          type: string
          enum: 
                - Market
                - Negotiated
          description: Rate type of the shipment.
          example: "Market"
