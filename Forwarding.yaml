        confirmationId:
          type: 
            - string
            - "null"
          description: Confirmation identifier for the shipment.
          example: "374680504"
        quoteIdentificationNumber:
          type: 
            - string
            - "null"
          description: Quote identification number.
          example: "200025511"
        status:
          type: string
