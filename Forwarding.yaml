    patch:
      summary: Set Order Date
      operationId: orderSetDate
      tags:
        - Orders
      description: Set Date for one or all active orders from a shipper to a future date. Past dates are not allowed except for yesterday
      parameters:
        - $ref: "#/components/parameters/transId"
        - $ref: "#/components/parameters/transactionSrc"
        - $ref: "#/components/parameters/Content-Type"
        - $ref: "#/components/parameters/X-BusinessGUID"
        - $ref: "#/components/parameters/X-ClientId"
        - name: shipper_account_number
          in: query
          description: Unique shipper number. Required for all updates.
          required: true
          schema:
            type: string
            example: "123456789"
            maxLength: 9
        - name: order_number
          in: query
          description: Unique order number. Required for individual order updates.
          required: false
          schema:
            type: string
            pattern: "^[0-9]{13}$"
            example: "3912088430001"
        - name: old_date
          in: query
          description:  The current date of the shipment(s).  Defaults to today if not provided. Required for moving all open shipments to a new date.
          required: false
          schema:
            $ref: "#/components/schemas/ApolloDateV1"
        - name: language
          in: query
          description: The language/culture that is being used for the API
          required: false
          schema:
            type: string
            example: "en-US"
      requestBody:
        required: true
        description: Container for the order details to be moved to another day.  if newDate value is not provided, it Defaults to today + 1. 
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApolloPatchReplaceReqV1"
            example:
              - op: replace
                path: /newDate
                value: 2025-07-24
      responses:
        "200":
