                address1: 7890 LOGISTICS RD
                city: ATLANTA
                state: GA
                postalCode: "30303"
                countryCode: US
                serviceCenterCode: ATL
                partyCode: 899df6b43f5b5a7d41db2b8d4759c1e0
                contactName: John
                contactPhone: "777777777"
                contactEmail: john@example.com
                details:
                  - key: serialNumber
                    value: SN654321
