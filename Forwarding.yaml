        company:
          type: 
            - string
            - "null"
          maxLength : 40
          description: The name of the company associated with the Shipment/Party
          example: Ship To Philip
        address1:
          type: 
            - string
            - "null"
          maxLength : 40
          description: The line 1 of the address associated with the Party
          example: 45678 MAIN ST
        address2:
          type: 
            - string
            - "null"
          description: The line 2 of the address associated with the Party
          example: Suite 320
        address3:
          type: 
            - string
            - "null"
          maxLength : 40
          description: The line 3 of the address associated with the Party
          example: Floor 3
        city:
          type: 
            - string
            - "null"
          maxLength : 40
          description: The address city associated with the Party
          example: Newark
        state:
          type: 
            - string
            - "null"
					  
          maxLength : 4
          pattern: $|^[A-Z]{2}
          description: The <a href="https://en.wikipedia.org/wiki/ISO_3166-2:US" target="_blank">ISO 3166-2</a> state code associated with the Party
          example: NJ
        postalCode:
          type: 
            - string
            - "null"
          maxLength : 15
          description: The postal code of the address associated with the Party
          example: "07102"
        countryCode:
          type: 
            - string
            - "null"
					  
          maxLength : 4
          description: The <a href="https://www.iso.org/iso-3166-country-codes.html" target="_blank">ISO 3166</a> country or territory code associated with the Party
          pattern: ^[A-Z]{2}
          example: US
    ApolloShipperAccountNumberV1:
      description: The UPS Freight Account Number that identifies the Shipper
      type: 
        - string
        - "null"
      minLength: 1
      maxLength: 9
      example: "123456789"
    ApolloTimeV1:
      type: string
      format: time      
      pattern: '^([01]\d|2[0-3]):([0-5]\d):([0-5]\d)$'
      example: 09:00:00
    ApolloWeightV1:
      type: number
      format: decimal
      multipleOf: 0.01  
    ApolloPatchReplaceReqV1:
      type: array
      description: The unbounded list of objects to change with their values
      minItems: 1
      items:
        type: object
        required:
          - op
          - path
        properties:
          op:
            type: 
              - string
              - "null"
            enum:
              - replace
          path:
            type: 
              - string
              - "null"
            description: the field whose value is to be changed
            example: /newDate
          value:
            type: 
              - string
              - "null"
