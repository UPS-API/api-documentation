                $ref: "#/components/schemas/ApolloAccessorialsResponseDetailsV1"
            paymentTerms:
              type: array
																						   
              items:
                $ref: "#/components/schemas/PaymentTermV2"
            nextAvailPUDate:
              type: string
              format: date
              description : Next available pickup date
              example : "2026-01-09"
          required:
            - accessorials
            - paymentTerms
            - nextAvailPUDate
      required:
        - response
    ApolloAccessorialsResponseDetailsV1:
      type: object
      properties:
        code:
          type: string
          description: Code associated with accessorials.
          oneOf: 
            - title: "CUSTOMS CLEARANCE"
              enum: ["CC"]
            - title: "CUSTOMS VALUE"
              enum: ["CV"]
            - title: "DESTINATION DUTIES UNPAID"
              enum: ["DDU"]
            - title: "DELIVERY"
              enum: ["DLV"]
            - title: "DECLARED/INSURED VALUE"
              enum: ["DV"]
            - title: "FREE DOMICILE AVAILABLE"
              enum: ["DDP"]
            - title: "LIFT GATE"
              enum: ["LIFTGT"]
        name:
          type: string
          description: Name of the code associated with accessorials.
          example: LIFT GATE
    ApolloFullTrackingDetailsResponseV1:
      type: object
      description: Response object containing comprehensive tracking details for a shipment.
      required:
        - response
      properties:
        response:
          type: object
          description: Response container for tracking details
          properties:
            primaryInformation:
              $ref: '#/components/schemas/PrimaryInformation'
              description: Primary information and detailed tracking data for the shipment.
    PrimaryInformation:
      type: object
      description: Comprehensive primary information about the shipment including all tracking details.
      properties:
        id:
          type: string
          description: The unique identifier for the shipment.
          example: "SHIP123456789"
        shipmentNumber:
          type: string
          description: The shipment number assigned to this shipment.
          example: "SHIP123456789"
        upsFileNumber:
          type: string
          description: The UPS file number associated with the shipment.
          example: "FILE123456789012345"
        upsOffice:
          type: string
          description: The UPS office code handling the shipment.
          example: "ATL01"
        upsDatasource:
          type: string
          description: The data source system from which the shipment information is retrieved.
          example: "MAIN"
        shipper:
          type: string
          description: The name of the shipper (party sending the goods).
          example: "ABC Company"
        destinationConsignee:
          type: string
          description: The name of the destination consignee (party receiving the goods).
          example: "XYZ Corporation"
        principal:
          type: string
          description: The principal party responsible for the shipment.
          example: "ABC Company"
        proofOfDelivery:
          type: string
          description: The name of the person who received the shipment as proof of delivery.
          example: "John Smith"
        podDateTime:
          type: string
          format: date-time
          description: The date and time when the proof of delivery was obtained.
          example: "2025-01-10T14:30:00Z"
        shipmentType:
          type: string
          description: The type of shipment (e.g., Air, Ocean).
          example: "Air"
        shipmentServiceLevel:
          type: string
          description: The service level for the shipment (e.g., Express, Standard).
          example: "Express"
        modeOfTransportCode:
          type: string
          description: The code representing the mode of transport.
          example: "AIR"
        modeOfTransportName:
          type: string
          description: The name of the mode of transport.
          example: "Air Freight"
        primaryException:
          type: string
          description: The primary exception affecting the shipment, if any.
        shipmentBookedDateTime:
          type: string
          format: date-time
          description: The date and time when the shipment was booked.
          example: "2025-01-01T10:00:00Z"
        shipmentCreateDateTime:
          type: string
          format: date-time
          description: The date and time when the shipment was created in the system.
          example: "2025-01-01T09:00:00Z"
        originalScheduledDeliveryDateTime:
          type: string
          format: date-time
          description: The original scheduled delivery date and time for the shipment.
          example: "2025-01-10T12:00:00Z"
        latestScheduledDeliveryDateTime:
          type: string
          format: date-time
          description: The latest scheduled delivery date and time for the shipment.
          example: "2025-01-10T12:00:00Z"
        product:
          type: string
          description: The product or service type used for the shipment.
          example: "UPS Air Freight"
        actualDeliveryDateTime:
          type: string
          format: date-time
          description: The actual date and time when the shipment was delivered.
          example: "2025-01-10T14:30:00Z"
        milestoneStatus:
          type: string
          description: The current milestone status of the shipment (e.g., In Transit, Delivered).
          example: "Delivered"
        shipmentLatestStatusDateTime:
          type: string
          format: date-time
          description: The date and time of the latest status update for the shipment.
          example: "2025-01-10T14:30:00Z"
        lastKnownLocation:
          type: string
          description: The last known location of the shipment.
          example: "Atlanta, GA"
        consigneeReferenceNumber:
          type: array
          items:
            $ref: '#/components/schemas/CustomerReferenceInfo'
          description: List of consignee reference numbers associated with the shipment.
        customerPONumber:
          type: array
          items:
            $ref: '#/components/schemas/CustomerReferenceInfo'
          description: List of customer purchase order numbers associated with the shipment.
        references:
          type: array
          items:
            $ref: '#/components/schemas/Reference'
          description: List of various reference numbers associated with the shipment.
        shipmentAdditionalInformation:
          $ref: '#/components/schemas/AdditionalInformation'
          description: Additional information about the shipment including weight, volume, and cargo details.
        shipmentOrigin:
          $ref: '#/components/schemas/ShipmentAddress'
          description: The origin address from where the shipment was picked up.
        shipmentDestination:
          $ref: '#/components/schemas/ShipmentAddress'
          description: The destination address where the shipment is to be delivered.
        flightVoyageInformation:
          type: array
          items:
            $ref: '#/components/schemas/FlightVoyageInfo'
          description: List of flight or voyage information for the shipment journey.
        milestones:
          $ref: '#/components/schemas/Milestone'
          description: Milestone information tracking the progress of the shipment.
        shipmentExceptionDetails:
          $ref: '#/components/schemas/ShipmentExceptionDetails'
          description: Details about any exceptions that occurred during the shipment.
        containerInformation:
          type: array
          items:
            $ref: '#/components/schemas/ContainerInfo'
          description: Information about containers or packages used in the shipment.
        contactInfo:
          type: array
          items:
            $ref: '#/components/schemas/ContactInfo'
          description: Contact information for parties involved in the shipment.
    CustomerReferenceInfo:
      type: object
      description: Customer reference information for tracking and identification purposes.
      properties:
        referenceType:
          type: string
          description: The type of reference (e.g., PO, Invoice, Customer Reference).
          example: "PO"
        referenceNumber:
          type: string
          description: The reference number value.
          example: "PO987654"
    Reference:
      type: object
      description: General reference information associated with the shipment.
      properties:
        code:
          type: string
          description: The reference code identifier.
          example: "REF001"
        type:
          type: string
          description: The type of reference.
          example: "Customer Reference"
        number:
          type: string
          description: The reference number value.
          example: "CUST123456"
        createdDate:
          type: string
          format: date-time
          description: The date and time when the reference was created.
          example: "2025-01-01T09:00:00Z"
    AdditionalInformation:
      type: object
      description: Additional shipment information including weight, volume, and cargo details.
      properties:
        shipmentCategory:
          type: string
          description: The category or classification of the shipment.
          example: "General Cargo"
        quantity:
          type: string
          description: The total quantity of items in the shipment.
          example: "10"
        itemDescription:
          type: string
          description: Description of the items being shipped.
          example: "Electronic Equipment"
        incoterms:
          type: string
          description: The Incoterms code governing the shipment (e.g., FOB, CIF, DAP).
          example: "DAP"
        freightPaymentTerm:
          type: string
          description: The payment terms for the freight (e.g., Prepaid, Collect).
          example: "Prepaid"
        actualWeight:
          $ref: '#/components/schemas/WeightMeasurement'
          description: The actual weight of the shipment.
        chargeableWeight:
          $ref: '#/components/schemas/WeightMeasurement'
          description: The chargeable weight used for pricing calculations.
        shipmentVolume:
          $ref: '#/components/schemas/VolumeMeasurement'
          description: The total volume of the shipment.
    WeightMeasurement:
      type: object
      description: Weight measurement including the value and unit of measurement.
      properties:
        weight:
          type: string
          description: The weight value.
          example: "500"
        uomCode:
          type: string
          description: The unit of measurement code (e.g., KG, LB).
          example: "KG"
        uomLabel:
          type: string
          description: The descriptive label for the unit of measurement.
          example: "Kilograms"
    VolumeMeasurement:
      type: object
      description: Volume measurement including the value and unit of measurement.
      properties:
        volume:
          type: string
          description: The volume value.
          example: "2.5"
        uomCode:
          type: string
          description: The unit of measurement code (e.g., CBM, CFT).
          example: "CBM"
        uomLabel:
          type: string
          description: The descriptive label for the unit of measurement.
          example: "Cubic Meters"
    ShipmentAddress:
      type: object
      description: Address information for shipment origin or destination.
      properties:
        addressLine1:
          type: string
          description: The first line of the street address.
          example: "123 Industrial Blvd"
        addressLine2:
          type: string
          description: The second line of the street address (e.g., suite, building).
          example: "Suite 100"
        city:
          type: string
          description: The city name.
          example: "Los Angeles"
        stateProvince:
          type: string
          description: The state or province code.
          example: "CA"
        postalCode:
          type: string
          description: The postal or ZIP code.
          example: "90001"
        country:
          type: string
          description: The country code (ISO format).
          example: "US"
        unloc:
          type: string
          description: The UN Location Code (UNLOC) for the address.
          example: "USLAX"
    FlightVoyageInfo:
      type: object
      description: Information about a flight or voyage leg in the shipment journey.
      properties:
        leg:
          type: string
          description: The leg number in the journey sequence.
          example: "1"
        displayDepartureLocation:
          type: string
          description: The display name of the departure location.
          example: "Los Angeles (LAX)"
        displayArrivalLocation:
          type: string
          description: The display name of the arrival location.
          example: "Atlanta (ATL)"
        carrierCode:
          type: string
          description: The carrier code (airline or shipping line).
          example: "UA"
        carrierName:
          type: string
          description: The full name of the carrier.
          example: "United Airlines"
        vessel:
          type: string
          description: The name or type of vessel/aircraft.
          example: "Boeing 777"
        flightVoyageNumber:
          type: string
          description: The flight or voyage number.
          example: "UA1234"
        estimateDepartureDateTime:
          type: string
          format: date-time
          description: The estimated departure date and time.
          example: "2025-01-02T08:00:00Z"
        confirmedDepartureDateTime:
          type: string
          format: date-time
          description: The confirmed departure date and time.
          example: "2025-01-02T08:15:00Z"
        estimatedArrivalDateTime:
          type: string
          format: date-time
          description: The estimated arrival date and time.
          example: "2025-01-02T16:00:00Z"
        confirmedArrivalDateTime:
          type: string
          format: date-time
          description: The confirmed arrival date and time.
          example: "2025-01-02T15:45:00Z"
        masterBill:
          type: string
          description: The master bill of lading or airway bill number.
          example: "MASTER123456"
    Milestone:
      type: object
      description: Container for shipment milestone information.
      properties:
        shipmentMilestones:
          type: array
          items:
            $ref: '#/components/schemas/ShipmentMilestone'
          description: List of milestones achieved during the shipment journey.
    ShipmentMilestone:
      type: object
      description: Individual milestone in the shipment journey.
      properties:
        id:
          type: string
          description: The unique identifier for the milestone.
          example: "M001"
        label:
          type: string
          description: The descriptive label for the milestone (e.g., Picked Up, In Transit, Delivered).
          example: "Picked Up"
        milestoneCompletionDateTime:
          type: string
          format: date-time
          description: The date and time when the milestone was completed.
          example: "2025-01-01T14:00:00Z"
        milestoneUNLOC:
          type: string
          description: The UN Location Code where the milestone occurred.
          example: "USLAX"
    ShipmentExceptionDetails:
      type: object
      description: Details about exceptions that occurred during the shipment.
      properties:
        exceptionCount:
          type: string
          description: The total count of exceptions for the shipment.
          example: "0"
        exceptionList:
          type: array
          items:
            $ref: '#/components/schemas/ShipmentException'
          description: List of exception details.
    ShipmentException:
      type: object
      description: Individual exception that occurred during the shipment.
      properties:
        exceptionType:
          type: string
          description: The type or category of the exception.
          example: "Delay"
        exceptionReason:
          type: string
          description: The reason for the exception.
          example: "Weather conditions"
        exceptionDateTime:
          type: string
          format: date-time
          description: The date and time when the exception occurred.
          example: "2025-01-05T10:00:00Z"
        exceptionResolvedDateTime:
          type: string
          format: date-time
          description: The date and time when the exception was resolved, if applicable.
          example: "2025-01-05T14:00:00Z"
        isException:
          type: string
          description: Flag indicating whether this is an active exception (true/false).
          example: "false"
    ContainerInfo:
      type: object
      description: Information about a container or package in the shipment.
      properties:
        containerNumber:
          type: string
          description: The unique container or package number.
          example: "CONT123456"
        containerType:
          type: string
          description: The type of container (e.g., Pallet, Box, Crate).
          example: "Pallet"
        containerDescription:
          type: string
          description: A description of the container.
          example: "Standard Air Pallet"
        seal:
          type: string
          description: The seal number applied to the container for security.
          example: "SEAL789"
        quantity:
          type: string
          description: The quantity of items in the container.
          example: "10"
        containerWeight:
          $ref: '#/components/schemas/WeightMeasurement'
          description: The weight of the container.
        containerVolume:
          $ref: '#/components/schemas/VolumeMeasurement'
          description: The volume of the container.
    ContactInfo:
      type: object
      description: Contact information for parties involved in the shipment.
      properties:
        role:
          type: string
          description: The role code of the contact (e.g., S for Shipper, C for Consignee).
          example: "S"
        roleName:
          type: string
          description: The descriptive name of the role.
          example: "S"
        account:
          type: string
          description: The account number associated with the contact.
          example: "123456"
        businessId:
          type: string
          description: The business identifier for the contact.
          example: "BUS123456"
        name:
          type: string
          description: The name of the contact person or company.
          example: "ABC Company"
        phone:
          type: string
          description: The phone number for the contact.
          example: "+1-555-1234"
        attention:
          type: string
          description: The attention line or department name.
          example: "Shipping Department"
        address:
          $ref: '#/components/schemas/ContactAddress'
          description: The address information for the contact.
    ContactAddress:
      type: object
      description: Address information for a contact.
      properties:
        street:
          type: string
          description: The street address.
          example: "123 Industrial Blvd"
        city:
          type: string
          description: The city name.
          example: "Los Angeles"
        stateProvince:
          type: string
          description: The state or province code.
          example: "CA"
        postalCode:
          type: string
          description: The postal or ZIP code.
          example: "90001"
        country:
          type: string
          description: The country code (ISO format).
          example: "US"
        unloc:
          type: string
          description: The UN Location Code (UNLOC) for the address.
          example: "USLAX"
    # Commodities Response Schemas
    ApolloCommoditiesResponseV1:
      type: object
      description: Response containing a list of commodity details based on search criteria.
      properties:
        response:
          type: object
          description: Response wrapper object containing the commodities list.
          properties:
            commodities:
              type: array
              description: Array of commodity objects matching the search criteria.
              items:
                $ref: "#/components/schemas/CommodityDetail"
          required:
            - commodities
      required:
        - response

    CommodityDetail:
      type: object
      description: Represents the details and classification attributes of a commodity, including regulatory, safety, and mapping information.
      properties:
        name:
          type: string
          description: Name or description of the commodity.
          example: Account Books
        isManual:
          type: boolean
          description: Indicates whether the commodity entry was created manually or through automated processes.
          example: false
        isProhibited:
          type: boolean
          description: Indicates whether the commodity is prohibited for shipping.
          example: false
        isHazardous:
          type: boolean
          description: Indicates whether the commodity is classified as hazardous material requiring special handling and documentation.
          example: false
        isLithium:
          type: boolean
          description: Indicates whether the commodity contains lithium batteries, which require special handling and labeling.
          example: true
        isTemperatureControlRequired:
          type: boolean
          description: Indicates whether the commodity requires temperature-controlled storage and transportation.
          example: false
        productType:
          type: string
          description: Type of product or service line (e.g., NAAF, IAF, LCL, FCL).
          enum: 
          - NAAF
          - IAF
          - FCL
          - LCL
          example: NAAF
        additionNotes:
          type: 
            - string
            - "null"
          description: Additional notes, comments, or special instructions related to the commodity handling or shipping.
          example: Handle with care
        isHealthCareCommodity:
          type: boolean
          description: Indicates whether the commodity is classified as a healthcare or medical commodity requiring compliance with healthcare regulations.
          example: false
          
    ApolloPRQStatusResponseV1:
      type: object
      description: Successful response containing PRQ status information wrapped in a standard response envelope.
      properties:
        response:
          $ref: "#/components/schemas/PRQStatusData"
      required:
        - response

    PRQStatusData:
      type: object
      description: Contains the detailed status information for a PRQ (Pricing Request Quote).
      properties:
        prqStatus:
          type: string
          description: |
            Current status of the PRQ (Pricing Request Quote). Common values include:
            - NOT-AUTH: Not Authorized
            - AUTHORIZED: Authorized and approved
            - PENDING: Pending review or approval
            - REJECTED: Request was rejected
            - EXPIRED: Authorization has expired
          enum: [NOT-AUTH, AUTHORIZED, PENDING, REJECTED, EXPIRED, CANCELLED]
          example: NOT-AUTH
      required:
        - prqStatus
