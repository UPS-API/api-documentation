openapi: 3.1.0
info:
  title: Forwarding API v1
  version: "1.0"
  description: |
    Links the UPS Forwarding Hub to backend applications for the management of ocean and air freight shipments.
 
    # Key Business Values
    - UPS Forwarding Hub APIs unify ocean and air freight through a single, modern RESTful interface.
    - They accelerate time to market with simplified, scalable integration.
    - Near real-time rate quotes and booking enhance the customer experience.
    - Built-in tracking and visibility tools improve shipment transparency.
    - Streamlined documentation and developer support reduce onboarding time
 
    # Reference
    - <a href="https://developer.ups.com/api/reference/forwarding/errors" target="_blank" rel="noopener">Errors</a>
        <br/>
    <p>Try out UPS APIs with example requests using Postman and learn more about the UPS Postman Collection by visiting our <a href="https://developer.ups.com/api/reference/postman/guide"
    target="_blank" rel="noopener">Postman Guide</a>. Explore API documentation and sample applications through GitHub.</p>
    
    <a href="https://god.gw.postman.com/run-collection/29542085-f2cd7176-bd05-48ea-bb72-b359a11cff09?action=collection%2Ffork&source=rip_markdown&collection-url=entityId%3D29542085-f2cd7176-bd05-48ea-bb72-b359a11cff09%26entityType%3Dcollection%26workspaceId%3D7e7595f0-4829-4f9a-aee1-75c126b9d417" target="_blank" rel="noopener noreferrer">
      <img src="https://run.pstmn.io/button.svg" alt="Run In Postman" style="width: 128px; height: 32px;"></a>
    <a href="https://github.com/UPS-API" target="_blank" rel="noopener noreferrer">
      <img src="https://www.ups.com/assets/resources/webcontent/images/gitHubButton.svg" alt="Open in GitHub " style="width: 128px; height: 32px;">
 
servers:
  - url: https://www.onlinetools.ups.com/api/forwarding/{version}
    description: URL for OAuth based authentication that can be used for the UPS Production environment.
    variables:
      version:
        description: Denotes which version of the API to be called as new features are released.
        default: v1
        enum:
          - v1
  - url: https://www.onlinetoolsuat.ups.com/api/forwarding/{version}
    description: URL for OAuth based authentication that can be used for the UPS Staging environment.
    variables:
      version:
        description: Denotes which version of the API to be called as new features are released.
        default: v1
        enum:
          - v1
tags:
  - name: Orders
    description: Create, search, update, and cancel orders before processing.
  - name: Shipments
    description: Rate, create, submit, and manage freight shipments.
  - name: Info
    description: Retrieve reference data such as cities, currencies, and service types.
  - name: Documents
    description: Generate and reprint shipping labels and manifests.
  - name: Quotes
    description: Generate and retrieve freight rate quotes.

 
  
security:
  - oauth2: []
paths:
  /shipments/rates:
    post:
      summary: Rate Shipment
      description: Generate estimated freight charges based on the provided origin, destination, payor information, and cargo details.
      operationId: freightRating
      tags:
        - Forwarding
      parameters:
        - $ref: "#/components/parameters/transId"
        - $ref: "#/components/parameters/transactionSrc"
        - $ref: "#/components/parameters/Content-Type"
        - $ref: "#/components/parameters/X-BusinessGUID"
        - $ref: "#/components/parameters/X-ClientId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApolloAirFreightRateRequestV1"
            example:
              shipper:
                company: Philip
                account: "123456789"
                address1: 12380 MORRIS RD
                city: SHREWSBURY
                state: NJ
                postalCode: "7702"
                countryCode: US
                serviceCenterCode: SDF
                partyCode: 899df6b43f5b5a7d41db2b8d4759c1e0
                contactName: Michael
                contactPhone: "999999999"
                contactEmail: test@gmail.com
                details:
                  - key: serialNumber
                    value: SN654321
              consignee:
                company: Ship To Philip
                account: "123456789"
                address1: 12380 MORRIS RD
                city: SHREWSBURY
                state: NJ
                postalCode: "07102"
                countryCode: US
                serviceCenterCode: SDF
                partyCode: CID987654321
                contactName: Sarah
                contactPhone: "888888888"
                contactEmail: sarah@example.com
                details:
