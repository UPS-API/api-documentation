          in: query
          required: true
          schema:
            type: string
            description: Indicates whether the request is for "Air" or "Ocean".
            enum: [Air, Ocean]
            example: Ocean
          description: The type of shipment ("Air" or "Ocean").
        - name: shipment_id
          in: query
          required: true
          schema:
            type: string
            description: Unique identifier for the shipment.
            example: "200025511"
          description: The unique identifier for the shipment.
      responses:
        "200":
