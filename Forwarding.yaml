    #Accessorials
    ApolloAirUtilityAccessorialsRequestV1:
      type: object
      required:  [shipper, consignee,pickupDateTime] 
      properties: 
        shipper: 
          $ref: '#/components/schemas/ShipmentPartyDetails'
        consignee: 
          $ref: '#/components/schemas/ShipmentPartyDetails'
        serviceCode :
          type:
            - string
          enum: 
            - AMG
            - AM
            - D2G
            - D2
            - DFG
            - DF
            - CX
            - CA
            - EC 
            - MEXDF
            - SAT
            - SATG
            - GOLDP
            - CXD
            - CXC
            - CXCD
            - CAD
            - CAC
            - CACD
            - ECD
            - ECC
            - ECCD
            - EG
            - EA
        pickupDateTime : 
          type: string
          format: date
          description:  Accepted format - yyyy-MM-dd, yyyy/MM/dd, MM-dd-yyyy, MM/dd/yyyy format.
          pattern: ^\d{4}-\d{2}-\d{2}$
          example: "2025-08-11"
        dropOffTime : 
          description: The <a href="https://www.rfc-editor.org/rfc/rfc3339#section-5.6" target="_blank">RFC 3339</a> shipment dropoff time.
          $ref: "#/components/schemas/ApolloTimeV1"
    ShipmentPartyDetails:
      type: object
      required: [city, countryCode,isResidential]
      properties:
        city:
          type: string
          description: City of the address.
          minLength: 1
          maxLength: 30
          example: "New York"
        state:
          type: string
          description: The state code is required for country codes US or CA.
          maxLength : 5
          example: "NY"
        postalCode:
          type: string
          description: Postal or ZIP code.
          maxLength: 10
          example: "7702"
        countryCode:
          type: string
          description: Two-letter country code (e.g., US, CA, GB).
          minLength: 2
          maxLength: 2
          example: "US"
        isResidential:
          type: string
          description: Indicates if the address is residential ("Y" or "N").
          pattern: "^[YN]$"
          minLength: 1
          maxLength: 1
          example: "N"
    ApolloAirUtilityValidAccessorialsResponseV1:
