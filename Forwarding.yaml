                    value: "Keep it up"
              language: en-US
              transactionId: TXT123432
      responses:
        "200":
          description: Success
          headers:
            BkndTransId:
              $ref: "#/components/headers/BkndTransId"
            transId:
              $ref: "#/components/headers/transId"
            transactionSrc:
              $ref: "#/components/headers/transactionSrc"
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            X-BusinessGUID:
              $ref: "#/components/headers/X-BusinessGUID"
            X-ClientId:
              $ref: "#/components/headers/X-ClientId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApolloAirFreightRateResponseV1"
              example:
                response:
                  rates:
                    - serviceType: "CA"
                      guaranteedDelivery: false
                      deliveryTime: "2026-02-13 17:00:00"
                      holdAtAirportTime: "2026-02-12 12:00:00"
                      totalCharge:
                        amount: "295.75"
                        currencyCode: "USD"
                      billableWeight: 373
                      weightUnit: "LBS"
                      dimensionalWeight: 373
                      minimumBillableWeightApplied: false
                      contractRate: false
                      charges:
									   
                        - code: FRT-I
                          description: Air Freight Shipping - Included
                          amount: 250.75
                          currencyCode: USD
                          includedInd: Y
                        - code: FEE
                          description: Fuel Surcharge
                          amount: 45.00
                          currencyCode: USD
                          includedInd: N
        "400":
          description: Bad Request
          headers:
            BkndTransId:
              $ref: "#/components/headers/BkndTransId"
            transId:
              $ref: "#/components/headers/transId"
            transactionSrc:
              $ref: "#/components/headers/transactionSrc"
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            APIErrorCode:
              $ref: "#/components/headers/APIErrorCode"
            APIErrorMessage:
              $ref: "#/components/headers/APIErrorMessage"
            X-BusinessGUID:
              $ref: "#/components/headers/X-BusinessGUID"
            X-ClientId:
              $ref: "#/components/headers/X-ClientId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApolloErrorResponseV1"
              examples:
                  missingField:
                    summary: Missing Required Field
                    value:
                      response:
                        errors:
                          - code: "-1001"
                            message: "Required field missing"
                  shprMissingField:
                    summary: Missing SHPR Required Field
                    value:
                      response:
                        errors:
                          - code: "-1001"
                            message: "Required field missing - shipper account is required"
                  requiredField:
                    summary: PaymentType Is Required
                    value:
                      response:
                        errors:
                          - code: "-1001"
                            message: "The field - Shipment.PaymentType is Required"
                  itemCountField:
                    summary: Item Count 0
                    value:
                      response:
                        errors:
                          - code: "-1001"
                            message: "The field - Shipment.Items[0].Count must be between 1 and 99999."
                  pieceCountField:
                    summary: Piece Weights Required
                    value:
                      response:
                        errors:
                          - code: "-5242"
                            message: "Piece weights are required when total weight not entered."

        "401":
          description: Unauthorized Request
          headers:
            BkndTransId:
              $ref: "#/components/headers/BkndTransId"
            transId:
              $ref: "#/components/headers/transId"
            transactionSrc:
              $ref: "#/components/headers/transactionSrc"
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            APIErrorCode:
              $ref: "#/components/headers/APIErrorCode"
            APIErrorMessage:
              $ref: "#/components/headers/APIErrorMessage"
            X-BusinessGUID:
              $ref: "#/components/headers/X-BusinessGUID"
            X-ClientId:
              $ref: "#/components/headers/X-ClientId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApolloErrorResponseV1"
              example:
                response:
                  errors:
                    - code: "-250002"
                      message: Invalid Authentication Information.
        "500":
          description: Server Error
          headers:
            BkndTransId:
              $ref: "#/components/headers/BkndTransId"
            transId:
              $ref: "#/components/headers/transId"
            transactionSrc:
              $ref: "#/components/headers/transactionSrc"
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            APIErrorCode:
              $ref: "#/components/headers/APIErrorCode"
            APIErrorMessage:
              $ref: "#/components/headers/APIErrorMessage"
            X-BusinessGUID:
              $ref: "#/components/headers/X-BusinessGUID"
            X-ClientId:
              $ref: "#/components/headers/X-ClientId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApolloErrorResponseV1"
              example:
