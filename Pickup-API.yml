components:
  securitySchemes:
    OAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          x-tokenEndpointAuthMethod: client_secret_basic
          tokenUrl: https://api.lynkup.com/ent-services/security/v1/oauth/token
          scopes: {}
  
  schemas:
    Address:
      type: object
      description: Address of the location
      required:
        - street1
        - postalCode
      properties:
        street1:
          type: string
          description: Address Line 1 (Street Number and Street Name)
          maxLength: 100
        street2:
          type: string
          description: Address Line 2 (not to be used for apartment / suite #)
          maxLength: 100
        apartmentNumber:
          type: string
          description: Apartment / Suite #
          maxLength: 50
        city:
          type: string
          description: City
          maxLength: 100
        state:
          type: string
          description: State
          maxLength: 100
        postalCode:
          type: string
          description: Postal code or zip.
          maxLength: 20
        countryCode:
          type: string
          description: 2-letter country code in ISO 3166-1 alpha-2 format. If not provided defaults to 'US'.
          default: US
          enum: 
            - US
            - CA
            - GB
            - AU
            - IE
        latitude:
          type: number
          format: double
          description: Latitude coordinates of the address
        longitude:
          type: number
          format: double
          description: Longitude coordinates of the address

    ErrorDetail:
      type: object
      required: 
        -  type
        -  message
      properties:
        type:
          type: string
        message:
          type: string
        parameter:
          type: 
            - string
            - 'null'
        entityId:
          type: 
            - string
            - 'null'
        entity:
          type: 
            - string
            - 'null'

    InvalidRequest:
      type: object
      properties:
        type:
          type: string
          example: "ERROR_TYPE"
        message:
          type: string
          example: "An error occurred" 
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'

    Weight:
      type: object
      description: Weight of an item
      required:
        - value
        - unit
      properties:
        value:
          type: number
          format: double
          description: weight
          minimum: 0
        unit: 
          type: string
          description: units for given weight in kg or lb
          enum: 
            - kg
            - lb

    Size:
      type: object
      description: Dimensions of the item.
      required:
        - height
        - width
        - length
        - unit
      properties:
        height:
          type: number
          format: double
          description: Height
          minimum: 0
        width:
          type: number
          format: double
          description: Width
          minimum: 0
        length:
          type: number
          format: double
          description: Length
          minimum: 0
        unit: 
          type: string
          description: units for given size in cm or in
          enum: 
            - cm
            - in
              
    TimeWindow:
      type: object
      properties:
        startsAt:
          oneOf:
            - type: integer
              description: "Start of the window. Unix time in milliseconds. (conditional)"
              format: int64
            - type: "null"
        endsAt:
          oneOf:
            - type: integer
              description: "End of the window. Unix time in milliseconds. (conditional)"
              format: int64
            - type: "null"

    Driver:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          description: "Name of the driver"
        photo:
          type: string
          maxLength: 1000
          description: "URL to the driver's photo"
        phoneNumber:
          type: string
          maxLength: 20
          description: "Phone number of the driver"
        driverExternalId:
          type: string
          maxLength: 100
          description: "External identifier for the driver"
        driverId:
          type: string
          maxLength: 100
          description: "Unique identifier for the driver"
      required:
        - name
     
    Vehicle:
      type: object
      properties:
        type:
          type: string
          maxLength: 100
          description: "Type of the vehicle"
        color:
          type: string
          maxLength: 100
          description: "Color of the vehicle"
        number:
          type: string
          maxLength: 100
          description: "License plate number of the vehicle"
        make:
          type: string
          maxLength: 100
          description: "Make of the vehicle"
        description:
          type: string
          maxLength: 1000
          description: "Additional description of the vehicle"
        parkingSlot:
          type: string
          maxLength: 100
          description: "Parking slot allocated to the vehicle"
        vehicleExternalId:
          type: string
          maxLength: 100
          description: "External identifier for the vehicle"
        vehicleId:
          type: string
          maxLength: 100
          description: "Unique identifier for the vehicle"
    Item:
      type: object
      description: "Details of an item within a package"
      required:
        - sku
      properties:
        sku:
          type: string
          description: "An ID that identify the product/variant from the brand's catalog."
          maxLength: 100
        upc:
          type: string
          description: "Universal Product Code for the item"
          maxLength: 100
        category:
          type: string
          description: "Category of Item"
          maxLength: 100
        quantity:
          type: integer
          format: int32
          description: "Number of items of the SKU"
          minimum: 1
        size:
          $ref: '#/components/schemas/Size'
        weight:
          $ref: '#/components/schemas/Weight'
        price:
          type: number
          format: double
          description: "Retail price of the item."
          minimum: 0
        salePrice:
          type: number
          format: double
          description: "Sale price of the item."
          minimum: 0
        image:
          type: string
          description: "Link to the image file of the item."
          maxLength: 200
        title:
          type: string
          description: "Title of the item."
          maxLength: 200
        description:
          type: string
          description: "Description of the item."
          maxLength: 10000
        itemAttributes:
          type: object
          description: "Custom item attributes."
        tags:
          type: array
          description: "Additional information related to the item."
          items:
            type: string
          minItems: 0
          maxItems: 20
    
    Package:
      type: object
      description: "Package Details"
      required:
        - name
      properties:
        name:
          type: string
          description: "Name of package created in our system, or pass the value 'custom'."
          default: "custom"
          maxLength: 100
        description:
          type: string
          description: "A brief description about the package contents."
          maxLength: 10000
        size:
          $ref: '#/components/schemas/Size'
        weight:
          $ref: '#/components/schemas/Weight'
        quantity:
          type: integer
          format: int32
          description: "Number of Packages"
          minimum: 1
        itemQuantity:
          type: integer
          format: int32
          description: "Number of items in a single package."
          minimum: 1
        itemList:
          type: array
          description: "Array of items in the package."
          items:
            $ref: '#/components/schemas/Item'
          maxItems: 1000
        temperatureControl:
          type: string
          description: "Temperature information of the package"
          enum:
            - frozen
            - refrigerated
            - cool
            - ambient
            - warm
            - none
        content:
          type: array
          description: "Content information of the package"
          items:
            type : string
            enum:
            - alcohol
            - fragile
            - tobacco
            - rx
            - perishable
        barcode:
          type: string
          description: "Barcode sent to the provider for scanning the packages"
          default: "null"
          maxLength: 500

    Customer:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          description: Name of the customer
        email:
          type: string
          maxLength: 100
          description: Email address of the customer
        phone:
          type: string
          maxLength: 20
          description: Phone number of the customer
        userExternalId:
          type: string
          maxLength: 100
          description: External identifier for the user
      required:
        - name
        - phone

    LastLocation:
        type: object
        properties:
          updatedAt:
            type: "string"
            format: "date-time"
            description: "Timestamp of the last update in ISO 8601 format"
          latitude:
            oneOf:
              - type: "number"
              - type: "null"
            minimum: -90
            maximum: 90
            description: "Latitude of the last known location, within +/-90"
          longitude:
            oneOf:
              - type: "number"
              - type: "null"
            minimum: -180
            maximum: 180
            description: "Longitude of the last known location, within +/-180"
          isManual:
            oneOf:
              - type: "boolean"
              - type: "null"
            description: "Indicates whether the location was manually updated"
  
        required:
          - updatedAt
          - latitude
          - longitude
    
    PickupReferenceLinkObject:
      type: object
      properties:
        hostedTrackingUrl:
          type: 
            - string
            - 'null'
          maxLength: 100
          description: "URL for hosted tracking"
          format: uri
          example: "https://tracking.example.com"
        customerWebflowUrl:
          type: 
            - string
            - 'null'
          maxLength: 1000
          format: uri
          description: "Customer-facing webflow URL"
          example: "https://customer.example.com/webflow"
        hostedFeedbackUrl:
          type: 
            - string
            - 'null'
          maxLength: 100
          format: uri
          description: "URL for hosted feedback"
          example: "https://feedback.example.com"
      required: []
            
    PickupRequest:
      type: object
      properties:
        orderExternalId:
          type: string
          maxLength: 100
          description: "Client-side identifier for the pickup record."
        groupId:
          oneOf:
            - type: string
              maxLength: 100
            - type: "null"
          description: "Group ID used to group multiple orders together, providing a combined post-purchase experience."
        pickupTime:
          oneOf:
            - $ref: '#/components/schemas/TimeWindow'
            - type: "null"
          description: "Time window during which the package will be ready for pickup."
        locationExternalId:
          type: string
          maxLength: 100
          description: "Unique identifier for the pickup location (see Create Location API)."
        customer:
          $ref: '#/components/schemas/Customer'
          description: "Customer details associated with the pickup."
        itemList:
          type: array
          items:
            $ref: '#/components/schemas/Item'
          maxItems: 100
          description: >
            Array of items included in the pickup order.
            Each item in this list represents a unique SKU with its associated details and quantities.
            These items are referenced by the `itemList` property within each package in the `packages` array.
        packages:
          type: array
          items:
            $ref: '#/components/schemas/Package'
          maxItems: 50
          description: >
            Array of packages included in the pickup order.
            Each package contains an `itemList` property that references items from the order `itemList` by SKU.
            The `quantity` of each item within a package must not exceed the total `quantity` provided for that item in the `itemList`.
        pickupInstructions:
          oneOf:
            - type: string
              maxLength: 10000
            - type: "null"
          description: "Instructions related to the pickup."
        orderValue:
          type: number
          minimum: 0
          description: "Total value of the order in major units as a decimal, e.g. 10.00 ($10.00 USD)."
        createdDate:
          type: integer
          format: int64
          description: "Unix timestamp in milliseconds representing the creation date."
        locale:
          type: string
          maxLength: 5
          description: Locale of the pickup request, in IETF BCP 47 format (e.g., 'en-US' for English - United States).
        orderAttributes:
          type: object
          additionalProperties:
            oneOf:
              - type: string
                maxLength: 500
              - type: number
              - type: boolean
              - type: array
                maxItems: 100
                items:
                  oneOf:
                    - type: string
                    - type: number
                    - type: boolean
          description: "Configurable key-value pairs of custom order attributes."
      required:
        - orderExternalId
        - locationExternalId
        - customer

    Feedback:
      type: object
      properties:
        rating:
          type: number
          minimum: 0
          description: "Rating given in the feedback"
          example: 4.5
        comment:
          type: string
          maxLength: 100
          description: "Optional comment provided with the feedback"
          example: "Great service!"
        source:
          type: string
          maxLength: 100
          description: "Source of the feedback"
          example: "Customer survey"
      required: []

    PickupResponse:
      type: object
      properties:
        id: 
          type: string
          description: "Unique identifier for the pickup record generated by the system."
          pattern: '^[a-fA-F0-9]{24}$'
          example: '60b8d6c9e4b0f5d3a1a6e500'
        orderExternalId:
          type: string
          maxLength: 100
          description: "Identifier for the order generated in the client system"
        tenantId:
          type: string
          maxLength: 100
          description: "Unique identifier for the tenant making the pickup request."
        groupId:
          oneOf:
            - type: "string"
            - type: "null"
          maxLength: 100
          description: "Group ID used to group multiple orders together, providing a combined post-purchase experience."
        pickupTime:
          $ref: '#/components/schemas/TimeWindow'
          description: "Time window during which the package will be ready for pickup."
        actualPickupTime:
          type: 
            - number
            - 'null'
          minimum: 0
          description: "Actual timestamp in milliseconds for when the package was picked up."
        estimatedPickupTime:
          $ref: '#/components/schemas/TimeWindow'
          description: "Estimated time window for picking up the package."
        locationExternalId:
          type: string
          maxLength: 100
          description: "Unique identifier for the pickup location (see Create Location API)."
        brandExternalId:
          type: string
          maxLength: 100
          description: "Unique identifier for the brand associated with the order."
        pickupAddress:
          $ref: '#/components/schemas/Address'
          description: Address where the pickup will occur
        customer:
          $ref: '#/components/schemas/Customer'
          description: Customer details associated with the pickup
        itemList:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/Item'
          description: 
            Array of items included in the pickup order. 
            Each item in this list represents a unique SKU with its associated details and quantities.
            These items are referenced by the `itemList` property within each package in the `packages` array.
        packages:
          type: array
          maxItems: 50
          items:
            $ref: '#/components/schemas/Package'
          description: 
            Array of packages included in the pickup order.
            Each package contains an `itemList` property that references items from the order `itemList` by SKU.
            The `quantity` of each item within a package must not exceed the total `quantity` provided for that item in the `itemList`.
        status:
          type: string
          enum:
            - REQUEST_RECEIVED
            - PENDING_DISPATCH
            - PENDING_RELEASE
            - PENDING_AUTORETRY
            - ORDER_DISPATCHED
            - STAGED
            - ORDER_FAILED
            - PICKUP_STARTED
            - PICKUP_NEARBY
            - PICKUP_AT_LOCATION
            - ORDER_DELIVERED
            - ORDER_CANCELLED
            - ORDER_REDELIVERY
            - PICKUP_EXCEPTION
            - ORDER_EXCEPTION
            - ERROR_EXCEPTION
          maxLength: 100
          description: Status of the pickup
        pickupInstructions:
          oneOf: 
            -  type: string
               maxLength: 10000
            -  type: 'null'        
          description: "Additional notes related to the pickup"
        referenceLinks:
          $ref: "#/components/schemas/PickupReferenceLinkObject"
          description: "Reference links for the pickup, such as customer webflow url."
        orderValue:
          type: number
          minimum: 0
          description: "Total value of the order in major units as a decimal, e.g. 10.00 ($10.00 USD)."
        alternatePickupPerson:
          $ref: "#/components/schemas/Customer"
        driver:
          oneOf: 
            - $ref: '#/components/schemas/Driver'
            - type: 'null'      
          description: Driver details for the pickup
        vehicle:
          oneOf: 
            - $ref: '#/components/schemas/Vehicle'
            - type: 'null'   
          description: Vehicle details for the pickup
        lastLocation:
          $ref: '#/components/schemas/LastLocation'
          description: Last known location of the driver picking up the package/item
        feedback:
          oneOf: 
            - $ref: "#/components/schemas/Feedback"
            - type: 'null' 
          description: "Feedback provided for the delivery experience."
        orderAttributes:
          type: object
          additionalProperties:
            oneOf:
              - type: string
                maxLength: 500
              - type: number
              - type: boolean
              - type: array
                maxItems: 100
                items:
                  oneOf:
                    - type: string
                    - type: number
                    - type: boolean
          description: Configurable key-value pairs of custom order attributes
        currencyCode:
          type: 
            - string
            - "null"
          maxLength: 3
          description: "Currency code following ISO 4217 standards (e.g., USD)."
        locale:
          type: string
          maxLength: 5
          description: Locale of the pickup request, in IETF BCP 47 format (e.g., 'en-US' for English - United States).
        createdDate:
          type: integer
          format: int64
          description: Unix Timestamp in milliseconds representing the creation date
        createdAt:
          type: string
          description: Creation timestamp in ISO 8601 format
        lastUpdatedAt:
          type: string
          description: Last update timestamp in ISO 8601 format
      required:
        - orderExternalId
        - tenantId
        - customer
        - locationExternalId
        - brandExternalId
        - createdAt
        - lastUpdatedAt
    
    ListPickupsRequest:
      type: "object"
      properties:
        limit:
          type: "integer"
          description: "Limit the number of orders in the response. If not passed, the default is 1000. The maximum allowed is 1000."
          default: 1000
          format: "int32"
        lastUpdatedAt:
          type: "object"
          description: "Get all the orders which were updated within the provided time window. The time window cannot be greater than 30 days."
          properties:
            startsAt:
              type: "integer"
              description: "Start of the window. Unix time in milliseconds. (conditional)"
              format: "int64"
            endsAt:
              type: "integer"
              description: "End of the window. Unix time in milliseconds. (conditional)"
              format: "int64"
        orderExternalIds:
          type: "array"
          description: "Get the orders for the provided array of orderExternalIds."
          items:
            type: "string"
        groupId:
          type: "string"
          description: "Group ID used to group multiple orders together, providing a combined post-purchase experience."
        locationExternalIds:
          type: "array"
          description: "Get the orders for the provided array of locationExternalIds."
          items:
            type: "string"
        pickupTime:
          type: "object"
          description: "Get all orders whose pickupTime.startsAt is greater than or equal to the provided value. Only accepts startsAt from the Time Window. If pickupTime is present, deliveryTime.endsAt is required."
          properties:
            startsAt:
              oneOf:
                - type: integer
                  description: "Start of the window. Unix time in milliseconds. (conditional)"
                  format: int64
                - type: "null"
        deliveryTime:
          type: "object"
          description: "Get all orders whose deliveryTime.endsAt is lesser than or equal to the provided value. Only accepts endsAt from the Time Window. If deliveryTime is present pickupTime.startsAt is required."
          properties:
            endsAt:
              oneOf:
                - type: integer
                  description: "End of the window. Unix time in milliseconds. (conditional)"
                  format: int64
                - type: "null"
        createdAt:
          type: "object"
          description: "Get all orders which were created within the provided time window. The time window cannot be greater than 30 days."
          properties:
            startsAt:
              type: "integer"
              description: "Start of the window. Unix time in milliseconds. (conditional)"
              format: "int64"
            endsAt:
              type: "integer"
              description: "End of the window. Unix time in milliseconds. (conditional)"
              format: "int64"
        status:
          type: "array"
          description: "Get all orders having the provided statuses."
          items:
            type: "string"
        paginationToken:
          type: "string"
          description: "Returns the previous or next set of orders based on the paginationToken provided"
    
    OrderStatus:
      type: object
      properties:
        orderId:
          type: string
          description: "Unique Identifier for the order"
        tenantId:
          type: string
          description: "Identifier for the tenant"
        trackingUrl:
            type: string
            description: "Tracking URL"
        orderStatus:
          type: array
          items:
            type: object
            properties:
              status:
                type: "string"
                description: "Status of the order"
                enum:
                  - REQUEST_RECEIVED
                  - PENDING_DISPATCH
                  - PENDING_RELEASE
                  - PENDING_AUTORETRY
                  - ORDER_DISPATCHED
                  - STAGED
                  - ORDER_FAILED
                  - PICKUP_STARTED
                  - PICKUP_NEARBY
                  - PICKUP_AT_LOCATION
                  - ORDER_DELIVERED
                  - ORDER_CANCELLED
                  - ORDER_REDELIVERY
                  - PICKUP_EXCEPTION
                  - ORDER_EXCEPTION
                  - ERROR_EXCEPTION
              updatedAt:
                type: "string"
                description: "ISO 8601 date format"
              note:
                oneOf:
                  - type: "string"
                  - type: "null"
                description: "Optional note for the status"
              subStatus:
                oneOf:
                  - type: "string"
                  - type: "null"
              statusUser:
                oneOf:
                  - type: "string"
                  - type: "null"
                description: "User responsible for the status update"
              eventReason:
                type: object
                properties:
                  code:
                    type: "string"
                    description: "Code representing the reason for the event, e.g., CUSTOMER_REJECTED"
                  title:
                    type: "string"
                    description: "Title describing the reason, e.g., Customer Rejected"
                  note:
                    type: "string"
                    description: "Detailed note, e.g., RT-001 - Customer rejected (missing item or quality issue)"
          
