    |  INTERNAL_SERVER_ERROR |    500    | Transient| Internal Server Error: An unexpected error occurred while processing the request |


    ### /pickups/{pickup_external_id}/retry

    ### POST
    |           Type            | HTTP Code | Severity | Description |
    |---------------------------|-----------|----------|-------------|
    |  UNAUTHORIZED             |    401    |  Hard    | Unauthorized: Invalid or missing authentication token |
    |  INTERNAL_SERVER_ERROR    |    500    | Transient| Internal Server Error: An unexpected error occurred while processing the request |
    |  NOT_FOUND                |    404    |  Hard    | Order with id, 19345234, is not found |
    |  INVALID_DATA             |    422    |  Hard    | Order Id value is invalid |
    |  INVALID_OPERATION        |    409    |  Hard    | The Order can no longer be retried |
    |  NO_PROVIDER_ASSIGNED     |    422    |  Hard    | No Provider has been assigned to the mentioned location.                   |
    |  NO_PROVIDER_MATCHED      |    422    |  Hard    | No Provider matched the criteria for the requested delivery.               |
    |  PLACE_ORDER_FAILED       |    422    | Transient| Failed to place the requested order with the configured providers.         |
    |  TOO_MANY_REQUESTS        |    429    | Transient| Too many requests received per second.                                     |
    |  UNMAPPED_ERROR           |    422    | Transient| Request received unidentifiable error response.                            |

    ### /pickups/{pickup_external_id}/status

    ### PUT
    |           Type            | HTTP Code | Severity | Description |
    |---------------------------|-----------|----------|-------------|
    |  UNAUTHORIZED             |    401    |  Hard    | Unauthorized: Invalid or missing authentication token |
    |  INTERNAL_SERVER_ERROR    |    500    | Transient| Internal Server Error: An unexpected error occurred while processing the request |
    |  NOT_FOUND                |    404    |  Hard    | Order with id, 19345234, is not found |
        
servers:
  - url: https://api.lynkup.com/pickup/{version}
    description: Integration hub Production OAuth.
    variables:
      version:
        default: v1
        enum:
         - v1
  - url: 'https://sanbox.api.lynkup.com/pickup/{version}'
    description: Integration hub Sandbox Production OAuth.
    variables:
      version:
       default: v1
       enum:
          - v1

tags: 
  - name: Pickup Order
    description:  |
      Endpoints for managing the lifecycle of pickup orders, including creation, updates, and cancellation.
      
security:
  - OAuth2ClientCredentials: []

paths:          
  /pickups:
     post:
      summary: Create Pickup Order
      description: |
       This endpoint enables the creation of a pickup order. By providing the required details, clients can initiate a pickup request, which will be processed asynchronously in the background.
       
       - The request is handled asynchronously, returning a REQUEST_RECEIVED status upon successful submission.
       - Real-time status updates for the Pickup order are available through the platform's Webhooks.
      operationId: createPickup
      tags: 
        -  Pickup Order
      security:
        - OAuth2ClientCredentials: []
      parameters:
        - name: version
          in: path
          description: version
          required: true
          schema:
            type: string
            default: v1
            enum:
                - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PickupRequest'
            examples:
              Complete request:
                value:
                  locationExternalId: "7709"
                  orderExternalId: "7709-001"
                  orderValue: 10
                  customer:
                    name: "asd"
                    phone: "+1 234-567-8900"
                    email: ""
                  packages:
                    - name: "Solid"
                      size:
                        length: 10
                        width: 10
                        height: 10
                        unit: 'in'
                      weight: 
                        value: 10
                        unit: 'lb'
                      itemQuantity: 1
                      description: "bungii pack 1"
                  itemList:
                    - sku: "sku 1"
                      quantity: 1
                      size:
                        length: 3
                        width: 2
                        height: 2
                        unit: 'in'
                      weight: 
                        value: 10
                        unit: 'lb'
                      price: 3
                      salePrice: 3
                      image: "https://qa.files.deliverysolutions.co/zebra/items/%5Bdeliverysolutions123456%5D/zebra/sku_1_1639056868709.png"
                      title: "Watch"
                  pickupTime: null
      responses:
        "201":
          description: "Resource is successfully created"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PickupResponse'
              examples:
                Result:
                  value: 
                    locationExternalId: "7709"
                    orderExternalId: "7709-001"
                    orderValue: 10
                    customer:
                      name: "asd"
                      phone: "+1 234-567-8900"
                      email: ""
                    packages:
                      - name: "Solid"
                        itemQuantity: 1
                        size:
                          length: 10
                          width: 10
                          height: 10
                          unit: 'in'
                        weight:
                          value: 10
                          unit: 'lb'
                        description: "bungii pack 1"
                        temperatureControl: "none"
                        barcode: "1YT4V90308440011"
                    itemList:
                      - sku: "sku 1"
                        quantity: 1
                        size:
                          length: 3
                          width: 2
                          height: 2
                          unit: 'in'
                        weight: 
                          value: 10
                          unit: 'lb'
                        price: 3
                        salePrice: 3
                        image: "https://qa.files.deliverysolutions.co/zebra/items/%5Bdeliverysolutions123456%5D/zebra/sku_1_1639056868709.png"
                        title: "Watch"
                    pickupTime:
                      startsAt: 1679592688115
                    orderAttributes: {}
                    tenantId: "dummyaccount1"
                    brandExternalId: "dummyaccount1"
                    groupId: null
                    currencyCode: "USD"
                    pickupAddress:
                      street1: "345 Harrison Avenue"
                      street2: ""
                      city: "Boston"
                      postalCode: "02118"
                      countryCode: "US"
                      state: "MA"
                      latitude: 42.3452369
                      longitude: -71.0639399
                    status: "REQUEST_RECEIVED"
                    driver: null
                    vehicle: null
                    actualPickupTime: null
                    createdAt: ""
                    lastUpdatedAt: ""
        "422":
          description: "Processing failed as request contains invalid data"
          headers: 
            apierrorcode:  
              required: true
              description: 'The API error code'
              schema: 
                type: string 
            apierrormsg:  
              required: true
              description: 'The API error message.'
              schema: 
                type: string 
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvalidRequest"
              examples:
                Result:
                  value: 
                    errors:
                      - type: "INVALID_DATA"
                        message: "No such locationExternalId exists in our system. Please provide a valid locationExternalId."
                        parameter: locationExternalId
                        entityId: location-1
                        entity: location
                    type: "INVALID_DATA"
                    message: "No such locationExternalId exists in our system. Please provide a valid locationExternalId."
        "400":
          description: "Bad Request"
          headers: 
            apierrorcode:  
              required: true
              description: 'The API error code'
              schema: 
                type: string 
            apierrormsg:  
              required: true
              description: 'The API error message.'
              schema: 
                type: string 
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequest'
              examples:
                Result:
                  value: 
                    errors:
                      - type: INVALID_DATA
                        message: "locationExternalId is a required field. The field is missing."
                        parameter: locationExternalId
                        entityId: null
                        entity: null
                    type: VALIDATION_ERROR
                    message: "Failed to process request"    
        '500':
          description: "Internal server error"
          headers: 
            apierrorcode:  
              required: true
              description: 'The API error code'
              schema: 
                type: string 
            apierrormsg:  
              required: true
              description: 'The API error message.'
              schema: 
                type: string
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/InvalidRequest'
              examples:
                Internal Server Error:
                  value:
                    message: "An unexpected error occurred. Please try again later."
                    type: "INTERNAL_SERVER_ERROR"
                    errors:
                      - type: "SERVER_ERROR"
                        message: "An unexpected error occurred while processing the request."
        "401":
          description: Unauthorized
          headers: 
            bkndtransid:
              required: true
              description: The backend transaction id.
              schema: 
                type: string
            transId:
              description: The transaction id received from client
              schema: 
                type: string
            apierrorcode:  
              required: true
              description: 'The API error code'
              schema: 
                type: string 
            apierrormsg:  
              required: true
              description: 'The API error message.'
              schema: 
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UPSErrorResponse'
              example:
                response:
                  errors:
                  - code: UJ0001
                    message: Invalid token or token is not present.
      deprecated: false

  /pickups/list:
    post:
      summary: "List Pickup Orders"
      
      description: |
        Use this endpoint to retrieve a filtered list of pickups based on specified criteria. By default, if no filters are applied, PickupResponse: created within the last 24 hours will be returned.

        This API supports advanced filtering options such as:

        - **Time Filters**: Filter pickups based on their `createdAt`, `pickupTime`, or `lastUpdatedAt`.

        - **Identifiers**: Search by `orderExternalIds` or `locationExternalIds`.

        - **Statuses**: Retrieve pickups based on their current status (e.g., `PICKUP_STARTED`, `ORDER_DELIVERED`, `PICKUP_AT_LOCATION`).

        - **Pagination**: Use the `paginationToken` field to retrieve subsequent sets of results when dealing with large datasets.

        The request body allows flexible and precise filtering, making it easy to tailor the response to your specific needs. The response will contain the requested pickup data, and if applicable, a `paginationToken` to fetch additional results.
      operationId: "listPickups"
      tags: 
        -  Pickup Order
      security:
        - OAuth2ClientCredentials: []
      parameters:
        - name: version
          in: path
          description: version
          required: true
          schema:
            type: string
            default: v1
            enum:
                - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListPickupsRequest"
            examples:
              All parameters utilised:
                value:
                  limit: 100
                  lastUpdatedAt:
                    startsAt: 1651402682000
                    endsAt: 1652266731000
                  orderExternalIds:
                    - "1908241"
                  locationExternalIds:
                    - "100983"
                  pickupTime:
                    startsAt: 1651402682000
                  deliveryTime:
                    endsAt: 1652266731000
                  createdAt:
                    startsAt: 1651402682000
                    endsAt: 1652266731000
                  status:
                    - "ORDER_DISPATCHED"
                    - "ORDER_DELIVERED"
                    - "ORDER_CANCELLED"
                    - "PICKUP_STARTED"
                    - "PICKUP_COMPLETED"
                  paginationToken: "NjI2N2M5YWIwM2FiNjQ5NDdjYWZiYmMxXzYyNjdjOWFiMDNhYjY0OTQ3Y2FmYmJjMV82MjY3Y2FkNzYyN2Y1ZjY1OGM4YjljNTNfbmV4dA=="
              Pagination token to get next set of results:
                value:
                  limit: 100
                  paginationToken: "NjI2N2M5YWIwM2FiNjQ5NDdjYWZiYmMxXzYyNjdjOWFiMDNhYjY0OTQ3Y2FmYmJjMV82MjY3Y2FkNzYyN2Y1ZjY1OGM4YjljNTNfbmV4dA=="
      responses:
        "400":
          description: "Bad Request"
          headers: 
            apierrorcode:  
              required: true
              description: 'The API error code'
              schema: 
                type: string 
            apierrormsg:  
              required: true
              description: 'The API error message.'
              schema: 
                type: string 
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvalidRequest"
              examples:
                Date range greater than 30 days:
                  value: 
                    errors:
                      - type: "INVALID_DATA"
                        message: "lastUpdatedAt date range cannot be greater than 30 days"
                        parameter: lastUpdatedAt
                        entityId: null
                        entity: null
                    type: "INVALID_DATA"
                    message: "lastUpdatedAt date range cannot be greater than 30 days"
        "200":
          description: "Request was successful"
