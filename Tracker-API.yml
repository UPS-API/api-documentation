  /trackers/list:
    post:
      summary: Fetch list of trackers based on filters.
      description: |
        Use this endpoint to retrieve a filtered list of trackers based on specified criteria. By default, if no filters
        are applied, trackers created within the last 24 hours will be returned.

        This API supports advanced filtering options such as:
        - **Source Ids**: Use the `sourceIds` to pass an array of source ids. 
        - **Time Filters**: Filter trackers based on their `createdAt` or `lastUpdatedAt`.
        - **Identifiers**: Search by `orderExternalIds` or `locationExternalIds`.
        - **Statuses**: Retrieve trackers based on their current status (e.g., `ORDER_DISPATCHED`, `ORDER_DELIVERED`, `ORDER_CANCELLED`).
        - **Pagination**: Use the `pagination` field to retrieve subsequent sets of results when dealing with large datasets.

        The request body allows flexible and precise filtering, making it easy to tailor the response to your specific needs. 
        The response will contain the requested trackers data, and if applicable, use `pagination` field to fetch additional results.
      operationId: listTrackers
      security:
        - OAuth2ClientCredentials: []
      tags: 
        -  Tracker
      parameters:
        - name: version
          in: path
          description: version
          required: true
          schema:
            type: string
            default: v2
            enum:
                - v2
      requestBody:
        required: true
        content:
