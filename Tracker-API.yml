  - url: https://api.lynkup.com/tracker/{version}
    description: Integration hub Production OAuth.
    variables:
      version:
        default: v2
        enum:
         - v2 
  - url: 'https://sanbox.api.lynkup.com/tracker/{version}'
    description: Integration hub Sandbox Production OAuth.
    variables:
      version:
       default: v2
       enum:
          - v2         
tags: 
  - name: Tracker
    description: Endpoints for creating and managing trackers to enable post-purchase tracking and notifications.
