  /trackers/{tracker_id}:
    put:
      summary: Edit a tracker using trackerId.
      description: |
        This endpoint allows businesses to update a tracker using the trackerId provided by LynkUp. Trackers enable a unified
        post-purchase experience for all orders, including alerts, notifications, and tracking pages. To update a tracker, it should
        be existing in the system. This api can also be used to move the trackers from pre-dispatch status to dispatch status.
      operationId: updateTrackerUsingTrackerExternalId
      security:
        - OAuth2ClientCredentials: []
      tags: 
        -  Tracker
      parameters:
        - name: version
          in: path
          description: version
          required: true
          schema:
            type: string
            default: v2
            enum:
                - v2
        - name: tracker_id
          in: path
          description: The unique tracker id generated by the system after creating tracker
          required: true
          schema:
            type: string
            example: del_004
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrackerRequest"
            examples:
              Update Tracker:
                value:
                  provider: Self Delivery
                  trackingId: del_004
                  orderAttributes: {}
                  orderValue: 100
                  pickupTime:
                    startsAt: 1649253600000
                  deliveryTime:
                    endsAt: 1649268000000
                  deliveryContact:
                    name: Mein Wan
                    phone: "+12322322323"
                    email: nycustomer@email.com
              Wrong Name In Provider:
                value:
                  provider: DoorDash_123
                  trackingId: del_004
                  orderValue: 100
                  pickupTime:
                    startsAt: 1649253600000
                  deliveryTime:
                    endsAt: 1649268000000
                  deliveryContact:
                    name: Mein Wan
                    phone: "+12322322323"
                    email: nycustomer@email.com
              Tracker With Minimum Fields:
                value:
                  provider: Self Delivery
                  trackingId: del_004
              Tracker With Item List:
                value:
                  itemList: 
                    - sku: sku 1
                      quantity: 1
                      size:
                        length: 3
                        width: 2
                        height: 2
                        unit: in
                      weight: 
                        value: 10
                        unit: lb
                      price: 3
                      salePrice: 3
                      image: https://qa.files.deliverysolutions.co/zebra/items/%5Bdeliverysolutions123456%5D/zebra/sku_1_1639056868709.png
                      title: Watch
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackerResponse"
              examples:
                Successful Response:
                  $ref: "#/components/examples/TrackerExample"
        "400":
          description: Bad Request
          headers: 
            apierrorcode:  
              required: true
              description: The API error code
              schema: 
                type: string 
            apierrormsg:  
              required: true
              description: The API error message.
              schema: 
                type: string 
          content:
            application/json:
              schema: 
                $ref: "#/components/schemas/InvalidRequest"
              examples:
                Missing Tracker Data Error:
                  value: 
                    type: MISSING_TRACKER_DATA
                    message: Delivery Address not provided.
                    errors:
                      - type: MISSING_TRACKER_DATA
                        message: Delivery Address not provided.
                        parameter: deliveryAddress
                        entityId: null
                        entity: null
        "401":
          description: Unauthorized
          headers: 
            bkndtransid:
              required: true
              description: The backend transaction id.
              schema: 
                type: string
            transId:
              description: The transaction id received from client
              schema: 
                type: string
            apierrorcode:  
              required: true
              description: The API error code
              schema: 
                type: string 
            apierrormsg:  
