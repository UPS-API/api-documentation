  schemas:
    #/trackers
    CreateTrackerRequest:
      allOf:
        - $ref: "#/components/schemas/SharedRequestResponse"
        - type: object
          required: []
          properties:
            barcodes:
              type: array
              description: Barcodes sent to the provider for scanning the packages
              items:
                type: string
              example:
                - "12312351"
                - "77091078"
            createdDate:
              type: integer
              description: Date at which the order was originally created in Unix time in milliseconds
              format: int64
              example: 1694354791000
            itemList:
              type: array 
              items:
                $ref: "#/components/schemas/Item"
            locale:
              type: string
              description: |
                Comprised of the <a href="https://www.iso.org/iso-639-language-code.html" target="_blank">ISO 639</a> language code and the
                <a href="https://www.iso.org/iso-3166-country-codes.html" target="_blank">ISO 3166</a> country code separated by a dash.
              minLength: 5
              maxLength: 5
              pattern: ^[a-z]{2}-[A-Z]{2}$
              example: en-US
            pickup:
              type: object
              description: Information about the pickup. Either locationExternalId or pickup is mandatory.
              required:
                - name
              properties:
                name:
                  type: string
                  description: Name of the pickup location.
                  maxLength: 100
                  example: Postmates
                brandExternalId:
                  type: string
                  maxLength: 100
                  description: Brand under which the pickup location will be created. Defaults to default brand.
                  example: trackers_business
                locationExternalId:
                  type: string
                  maxLength: 100
                  description: Unique ID of the pickup location generated in your system and configured in our system.
                address:
                  $ref: "#/components/schemas/Address"
                pickupInstructions:
                  type: string
                  maxLength: 10000
                  description: Pickup instructions for the pickup location.
                providers:
                  type: array
                  description: List of providers configured for the pickup location.
                  items:
                    $ref: "#/components/schemas/Provider"
                contact:
                  $ref: "#/components/schemas/Contact"
                providerAttributes:
                  type: object
                  additionalProperties:
                    type: 
                      - string
                      - integer
                      - number
                      - boolean
                      - "null"
                    maxLength: 100
                  description: "Dynamic key-value pairs for provider attributes"
            provider:
              type: string
              description: Name of the provider configured in business
              maxLength: 100
              example: Self Delivery
    TrackerResponse:
      allOf:
        - $ref: "#/components/schemas/SharedRequestResponse"
        - type: object
          required: 
            - id
            - status
          properties:
            provider:
              type: 
                - 'null'
                - object
              properties:
                id:
                  type: 
                    - string
                    - "null"
                  maxLength: 100
                  description: Unique identifier for the provider
                name:
                  type: 
                    - string
                    - "null"
                  maxLength: 100
                  description: Name of the provider
                displayName:
                  type: 
                    - string
                    - "null"
                  maxLength: 100
                  description: Display name of the provider
                serviceType:
                  type:
                    - string
                    - "null"
                  maxLength: 100
                  description: Type of service provided
                serviceId:
                  type:
                    - string
                    - "null"
                  maxLength: 100
                  description: Unique identifier for the service
              required:
                - id
                - name
                - displayName
                - serviceType
            brandExternalId:
              type: string
              example: trackers_business
              maxLength: 100
            orderExternalId:
              type: string
              example: tracker001
              maxLength: 100
            status:
              type: string
              example: ORDER_DISPATCHED
            estimatedPickupTime:
              $ref: "#/components/schemas/TimeWindow" 
            estimatedDeliveryTime: 
              $ref: "#/components/schemas/TimeWindow"
            tips: 
              type: 
                - number
                - 'null'
            lastLocation:
              type: 
                - 'null'
                - object
              properties:
                updatedAt:
                  type: string
                  format: date-time
                  description: Timestamp of the last update in ISO 8601 format
                latitude:
                  type:
                    - number
                    - "null"
                  minimum: -90
                  maximum: 90
                  description: Latitude of the last known location, within +/-90
                  example: 29.9259823
                longitude:
                  type:
                    - number
                    - "null"
                  minimum: -180
                  maximum: 180
                  description: Longitude of the last known location, within +/-180
                  example: -95.5523879
                isManual:
                  type: boolean
                  description: Indicates whether the location was manually updated
                  default: false
              required:
                - updatedAt
                - latitude
                - longitude
            driver: 
              type:
                - 'null'
                - object
              properties:
                name:
                  type: string
                  maxLength: 100
                  description: Name of the driver
                photo:
                  type: string
                  maxLength: 1000
                  description: URL to the driver's photo
                phone:
                  type: string
                  maxLength: 20
                  description: Phone number of the driver
                driverExternalId:
                  type: string
                  maxLength: 100
                  description: External identifier for the driver
                driverId:
                  type: string
                  maxLength: 100
                  description: Unique identifier for the driver
              required:
                - name
            vehicle:
              type:
                - 'null'
                - object
              properties:
                type:
                  type: string
                  maxLength: 100
                  description: Type of the vehicle
                color:
                  type: string
                  maxLength: 100
                  description: Color of the vehicle
                number:
                  type: string
                  maxLength: 100
                  description: License plate number of the vehicle
                make:
                  type: string
                  maxLength: 100
                  description: Make of the vehicle
                description:
                  type: string
                  maxLength: 1000
                  description: Additional description of the vehicle
                parkingSlot:
                  type: string
                  maxLength: 100
                  description: Parking slot allocated to the vehicle
                vehicleExternalId:
                  type: string
                  maxLength: 100
                  description: External identifier for the vehicle
                vehicleId:
                  type: string
                  maxLength: 100
                  description: Unique identifier for the vehicle
            currencyCode:
              type: string
              example: USD
            timeZone:
              type: string
              example: America/Chicago
            pickupContact:
              $ref: "#/components/schemas/Contact"
            pickupAddress:
              $ref: "#/components/schemas/Address"
            id:
              type: string
              example: 62a051c1729b5dfcdeae1870
            referenceLinks:
              type: object
              properties:
                providerTrackingUrl:
                  type:
                    - string
                    - 'null'
                  maxLength: 1000
                  description: URL for provider tracking
                  example: https://provider.example.com/tracking
                labelLink:
                  type:
                    - string
                    - 'null'
                  maxLength: 1000
                  description: Label link generated for the delivery
                  example: https://example.com/label
                barcodeLink:
                  type:
                    - string
                    - 'null'
                  maxLength: 1000
                  description: Barcode link generated for the delivery
                  example: https://example.com/barcode
                qrcodeLink:
                  type:
                    - string
                    - 'null'
                  maxLength: 1000
                  description: QR code link generated for the delivery
                  example: https://example.com/qrcode
                trackingUrl:
                  type:
                    - string
                    - 'null'
                  maxLength: 100
                  description: Tracking URL for the delivery
                  example: https://example.com/tracking
                hostedTrackingUrl:
                  type:
                    - string
                    - 'null'
                  maxLength: 100
                  description: URL for hosted tracking
                  example: https://example.com/hosted-tracking
                customerWebflowUrl:
                  type: 
                    - string
                    - 'null'
                  maxLength: 1000
                  description: Customer-facing webflow URL
                  example: https://customer.example.com/webflow
                hostedFeedbackUrl:
                  type:
                    - string
                    - 'null'
                  maxLength: 100
                  description: URL for hosted feedback
                  example: https://example.com/feedback
                returnsUrl:
                  type:
                    - string
                    - 'null'
                  maxLength: 100
                  description: URL for returns
                  example: https://example.com/returns
              required: []
            feedback:
              type:
                - 'null'
                - object
              properties:
                rating:
                  type: number
                  minimum: 0
                  description: Rating given in the feedback
                  example: 4.5
                comment:
                  type: string
                  maxLength: 100
                  description: Optional comment provided with the feedback
                  example: Great service!
                source:
                  type: string
                  maxLength: 100
                  description: Source of the feedback
                  example: Customer survey
              required: []
            source:
              type: object
              required:
                - type
                - id
              properties:
                type:
                  type: string
                  description: Source type
                  example: lynk
                id:
                  type: string
                  description: Unique source identifier
                  example: "34567809876500"
                name:
                  type: string
                  description: Optional source name
                  example: Shopify
    ListTrackersRequest:
      type: object
      properties:
        lastUpdatedAt:
          description: Get all the orders which were updated within the provided time window. The time window cannot be greater than 30 days.
          $ref: "#/components/schemas/TimeWindow"
        orderExternalIds:
          type: array
          maxItems: 100
          description: Get the orders for the provided array of orderExternalIds.
          items:
            type: string
          example:
            - "1908241"
        groupId:
          type: string
          description: Get orders belonging to the provided groupId. This value is case-sensitive.
        locationExternalIds:
          type: array
          maxItems: 100
          description: Get the orders for the provided array of locationExternalIds.
          items:
            type: string
          example:
            - "100983"
        createdAt:
          description: Get all orders which were created within the provided time window. The time window cannot be greater than 30 days.
          $ref: "#/components/schemas/TimeWindow"
        statuses:
          type: array
          maxItems: 10
          description: Get all orders having the provided statuses.
          items:
            type: string
          example: 
            - ORDER_DELIVERED
        pagination:
          type: object
          description: |
            A opaque Base64 encoded string representing the position in the dataset from which
            to start returning results.
          properties:
            currentToken:
              type: string
              description: |
                A opaque Base64 encoded string representing the position in the dataset from which
                to start returning results.
              example: NjI2N2M5YWIwM2FiNjQ5NDdjYWZiYmMxXzYyNjdjOWFiMDNhYjY0OTQ3Y2FmYmJjMV82MjY3Y2FkNzYyN2Y1ZjY1OGM4YjljNTNfbmV4dA==
    UpdateTrackerRequest:
      type: object
      properties:
        provider:
          type: string
          description: Name of the provider configured in business
          maxLength: 100
        locationExternalId:
            type: string
            maxLength: 100
            description: locationExternalId of the pickup location.
        trackingId:
          type: string
          maxLength: 100
          description: Tracking Id given by the carrier
        groupId:
          type: string
          maxLength: 100
          description: Group ID allows you to group a number of orders and trackers together. It further helps in providing a combined post-purchase experience for them.
        orderAttributes:
            type: object
            additionalProperties:
              oneOf:
                - type: string
                  maxLength: 500
                - type: number
                - type: boolean
                - type: array
                  items:
                    type: string
                  maxItems: 100
                - type: array
                  items:
                    type: number
                  maxItems: 100
                - type: array
                  items:
                    type: boolean
                  maxItems: 100
            description: "Custom key-value pairs for configurable order attributes."       
        orderValue:
          type: number
          description: Value of the order in major units as decimals. e.g., 10.00 or 116.50.
          format: double
          minimum: 0
        pickupTime:
          oneOf: 
            - $ref: "#/components/schemas/TimeWindow"
            - type: "null"
          description: Time Window in which the package will be ready to be picked up. null defaults to ASAP.
        deliveryTime:
          oneOf: 
            - $ref: "#/components/schemas/TimeWindow"
            - type: "null"
          description: Time Window in which the package must be delivered by. null defaults to ASAP. Not needed for pickup type of tracker.        
        deliveryContact:
          $ref: "#/components/schemas/Customer"
        pickupInstructions:
          type: string
          maxLength: 10000
          description: Pickup instruction for the location. This will override the instructions configured with the pickup location.
        deliveryInstructions:
          type: string
          maxLength: 10000
          description: Delivery instructions for drop-off.
        itemList:
          type: array 
          items:
            $ref: "#/components/schemas/Item"
        locale:
          type: string
          maxLength: 5
          description: Preferred locale by the customer for a tracker. Value to be sent in the format of language code(ISO-639-1)-country code(ISO-3166-1-alpha-2). E.g fr-CA, en-US. Here, fr, en are language codes & CA, US are country codes.
        createdDate:
          type: integer
          description: Date at which the order was originally created in Unix time in milliseconds. e.g., 1694354791000.
          format: int64

    #COMMON
    Address:
      type: object
      description: Address of the location
      required:
        - street1
        - city
        - state
        - postalCode
      properties:
        street1:
          type: string
          description: Address Line 1 (Street Number and Street Name)
          maxLength: 100
          example: 12380 Morris Rd
        street2:
          type: string
          description: Address Line 2 (not to be used for apartment / suite #)
          maxLength: 100
          example:  3rd Floor
        apartmentNumber:
          type: string
          description: Apartment / Suite #
          maxLength: 50
          example: "S302"
        city:
          type: string
          description: City
          maxLength: 100
          example: Alpharetta
        state:
          type: string
          description: The <a href="https://en.wikipedia.org/wiki/ISO_3166-2:US" target="_blank">ISO 3166-2</a> country or territory code
          minLength: 2
          maxLength: 100
          example: GA
        postalCode:
          type: string
          description: Postal code or zip.
          maxLength: 20
          example: "30005"
        countryCode:
          type: string
          description: The <a href="https://www.iso.org/iso-3166-country-codes.html" target="_blank">ISO 3166</a> country or territory code
          minLength: 2
          maxLength: 2
          pattern: ^[A-Z]{2}
          default: US
          enum: 
            - US
            - CA
            - GB
            - AU
            - IE
        latitude:
          type: number
          format: double
          description: Latitude coordinates of the address
          example: 29.9259823
        longitude:
          type: number
          format: double
          description: Longitude coordinates of the address
          example: -95.5523879
    Contact:
      type: object
      required:
        - name
        - phone
      description: Customer information.
      properties:
        name:
          type: string
          description: First Name of Contact
          maxLength: 100
          example: Mein Wan
        phone:
          type: string
          description: Phone Number of the Contact
          maxLength: 20
          example: +232-232-2323
        email:
          type: string
          description: Email address of the Contact
          maxLength: 100
          example: nycustomer@email.com
    Customer:
      allOf:
        - $ref: '#/components/schemas/Contact'
        - type: object
          required:
            - name
            - phone
          description: Customer information.
          properties:
            userExternalId:
              type: string
              description: External Id assigned to customer
              maxLength: 100
    ErrorDetail:
      type: object
      required: 
        -  type
        -  message
      properties:
        type:
          type: string
        message:
          type: string
        parameter:
          type: 
            - string
            - 'null'
        entityId:
          type: 
            - string
            - 'null'
        entity:
          type: 
            - string
            - 'null'
    InvalidRequest:
      type: object
      properties:
        type:
          type: string
          example: ERROR_TYPE
        message:
          type: string
          example: An error occurred
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'    
    Item:
      type: object
      description: Details of an item within a package
      required:
        - sku
      properties:
        sku:
          type: string
          description: An ID that identify the product/variant from the brand's catalog.
          maxLength: 100
          example: sku 1
        upc:
          type: string
          description: Universal Product Code for the item
          maxLength: 100
        category:
            type: string
            description: Universal Product Code for the item
            maxLength: 100
        quantity:
          type: integer
          format: int32
          description: Number of items of the SKU
          minimum: 1
          example: 10
        size:
          $ref: '#/components/schemas/Size'
        weight:
          $ref: '#/components/schemas/Weight'
        price:
          type: number
          format: double
          description: Retail price of the item.
          minimum: 0
          example: 10.20
        salePrice:
          type: number
          format: double
          description: Sale price of the item.
          minimum: 0
          example: 8.60
        image:
          type: string
          description: Link to the image file of the item.
          maxLength: 200
          example: https://www.ups.com/webassets/icons/logo.svg
        title:
          type: string
          description: Title of the item.
          maxLength: 200
          example: UPS Logo
        description:
          type: string
          description: Description of the item.
          maxLength: 10000
          example: Thunmbnail UPS Logo from ups.com honmepage
        itemAttributes:
          type: object
          description: Custom item attributes.
          additionalProperties: true
        tags:
          type: array
          description: Additional information related to the item.
          items:
            type: string
            minItems: 0
            maxItems: 20
    Package:
      type: object
      description: Package Details
      properties:
        name:
          type: string
          description: Name of package created in our system, or pass the value 'custom'.
          default: custom
          maxLength: 100
          example: ACME1
        description:
          type: string
          description: A brief description about the package contents.
          maxLength: 10000
          example: Paper Targets
        size:
          $ref: '#/components/schemas/Size'
        weight:
          $ref: '#/components/schemas/Weight'
        quantity:
          type: integer
          format: int32
          description: Number of Packages
          default: 1
          minimum: 1
          example: 15
        itemQuantity:
          type: integer
          format: int32
          description: Number of items in a single package.
          default: 1
          minimum: 1
          example: 75
        itemList:
          type: array
          description: Array of items in the package.
          items:
            $ref: '#/components/schemas/Item'
          maxItems: 1000
        temperatureControl:
          type: string
          description: Temperature information of the package
          enum:
            - frozen
            - refrigerated
            - cool
            - ambient
            - warm
            - none
        content:
          type: array
          description: Content information of the package
          items:
            type: string
            enum:
              - alcohol
              - fragile
              - tobacco
              - rx
              - perishable
        barcode:
          type: string
          description: Barcode sent to the provider for scanning the packages
          default: "null"
          maxLength: 500
          example: https://example.com/barcode
    Provider:
      type: object
      properties:
        name:
          type:
            - string
            - "null"
          maxLength: 100
          description: Provider name
          example: Self Delivery
    SharedRequestResponse:
      type: object
      description: elements common between the request and response
      properties:
        locationExternalId:
          type: string
          maxLength: 100
          description: locationExternalId of the pickup location. Either locationExternalId or pickup is mandatory.
          example: "100983"
        trackingId:
          type: string
          maxLength: 100
          description: Tracking Id given by the carrier
          example: del_004
        type:
          type: string
          maxLength: 100
          enum: 
            - pickup
            - delivery
            - shipping
          description: Tracker type. Options are delivery/ pickup/ shipping. Defaults to shipping.
        groupId:
          type: 
            - string
            - "null"
          maxLength: 100
          description: |
            Group ID allows you to group a number of orders and trackers together. It further helps in providing
            a combined post-purchase experience for them.
        orderAttributes:
            type: object
            additionalProperties:
              oneOf:
                - type: string
                  maxLength: 500
                - type: number
                - type: boolean
                - type: array
                  items:
                    type: string
                  maxItems: 100
                - type: array
                  items:
                    type: number
                  maxItems: 100
                - type: array
                  items:
                    type: boolean
                  maxItems: 100
            description: "Custom key-value pairs for configurable order attributes."            
        orderValue:
          type: number
          description: Value of the order in major units as decimals. e.g., 10.00 or 116.50.
          format: double
          minimum: 0
          example: 100
        pickupTime:
          oneOf: 
            - $ref: "#/components/schemas/TimeWindow"
            - type: "null"
          description: Time Window in which the package will be ready to be picked up. null defaults to ASAP.
        deliveryTime:
          oneOf: 
            - $ref: "#/components/schemas/TimeWindow"
            - type: "null"
          description: Time Window in which the package must be delivered by. null defaults to ASAP. Not needed for pickup type of tracker.        
        deliveryContact:
          $ref: "#/components/schemas/Customer"
        deliveryAddress:
          $ref: "#/components/schemas/Address"
        pickupInstructions:
          type: string
          maxLength: 10000
          description: Pickup instruction for the location. This will override the instructions configured with the pickup location.
          example: knock loudly
        deliveryInstructions:
          type: 
            - string
            - "null"
          maxLength: 10000
          description: Delivery instructions for drop-off.
          example: gate code 123
        packages:
          type: array
          items:
            $ref: "#/components/schemas/Package"
        trackerExternalId:
          type: string
          maxLength: 100
          description: Unique Id of the tracker generated in your system and configured in our system, has to be unique.
    Size:
      type: object
      description: Dimensions of the item.
      required:
        - height
        - width
        - length
        - unit
      properties:
        height:
          type: number
          format: double
          description: Height
          minimum: 0
          example: 2
        width:
          type: number
          format: double
          description: Width
          minimum: 0
          example: 2
        length:
          type: number
          format: double
          description: Length
          minimum: 0
          example: 3
        unit: 
          type: string
          description: units for given size in cm or in
          enum: 
            - cm
            - in
    TimeWindow:
      type: object
      properties:
        startsAt:
          type: 
            - integer
            - "null"
          description: Start of the window. Unix time in milliseconds. (conditional)
          format: int64
          example: 1649253600000
        endsAt:
          type: 
            - integer
            - "null"
          description: End of the window. Unix time in milliseconds. (conditional)
          format: int64
          example: 1649268000000
    UPSErrorResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            errors:
              type: array
              description: The error response containing any errors that occurred.
              items:
                type: object
                properties:
                  code:
                    type: string
                    description: The error code.
                    example: VSS300
                  message:
                    type: string
                    description: The error message.
                    example: Locale is required. The Subscription request has been rejected.
                description: The error response containing any errors that occurred
    Weight:
      type: object
      description: Weight of an item
      required:
        - value
        - unit
      properties:
        value:
          type: number
          format: double
          description: weight
          minimum: 0
          example: 18
        unit: 
          type: string
          description: units for given weight in kg or lb
          enum: 
            - kg
            - lb

              