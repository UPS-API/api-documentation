tags:
  - name: "Delivery-Coverage"
    description: "Endpoints related to checking delivery coverage based on location and provider availability"
  - name: "Smart-Windows"
    description: "Smart Windows enables customers to manage their store timings, their pick-and-pack lead time windows, and associated pick-and-pack capacity and cost. It also allows customers to choose suitable windows for pick-up/delivery."
  - name: "Address-Confidence"
    description: "Endpoints for assessing confidence scores and validating drop-off addresses for logistics operations."
