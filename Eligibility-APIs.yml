paths:
  /smart-windows: 
    post:
      summary: Retrieve Available Time Windows
      description: |
        The Smart Windows API allows customers to view configurable time windows for pick-up or delivery based on the specified category, date, and location. This API supports configurations for pick-and-pack lead times, packing times, and associated capacities and costs.
        Time windows can be configured at the Business, Brand, or Location level, and the API provides up to 7 days of time windows. Optionally, the request can include a provider name to retrieve provider-specific time windows. Note that location timings must be configured before retrieving provider-specific windows.

        Each time window takes into account:
          - **Lead Time**: The preparation time required before an item can be picked.
          - **Packing Time**: The time needed to pack an order.

        This API enables flexible scheduling by providing a tailored view of available time windows, helping customers select suitable options for their operational needs.


      operationId: getSmartWindows
      tags:
        - Eligibility
      security:
        - OAuth2ClientCredentials: []
      parameters:
