components:
  securitySchemes:
    OAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          x-tokenEndpointAuthMethod: client_secret_basic
          tokenUrl: https://api.lynkup.com/ent-services/security/v1/oauth/token
          scopes: {}
  
  schemas:  
    Address:
      type: object
      description: Address of the location
      required:
        - street1
        - city
        - state
        - postalCode
      properties:
        street1:
          type: string
          description: Address Line 1 (Street Number and Street Name)
          maxLength: 100
        street2:
          type: string
          description: Address Line 2 (not to be used for apartment / suite #)
          maxLength: 100
        apartmentNumber:
          type: string
          description: Apartment / Suite #
          maxLength: 50
        city:
          type: string
          description: City
          maxLength: 100
        state:
          type: string
          description: State
          maxLength: 100
        postalCode:
          type: string
          description: Postal code or zip.
          maxLength: 20
        countryCode:
          type: string
          description: 2-letter country code in ISO 3166-1 alpha-2 format. If not provided defaults to 'US'.
          default: US
          enum: 
            - US
            - CA
            - GB
            - AU
            - IE
        latitude:
          type: number
          format: double
          description: Latitude coordinates of the address
        longitude:
          type: number
          format: double
          description: Longitude coordinates of the address

    ErrorDetail:
      type: object
      required: 
        -  type
        -  message
      properties:
        type:
          type: string
        message:
          type: string
        parameter:
          type: 
            - string
            - 'null'
        entityId:
          type: 
            - string
            - 'null'
        entity:
          type: 
            - string
            - 'null'

    InvalidRequest:
      type: object
      properties:
        type:
          type: string
          example: "ERROR_TYPE"
        message:
          type: string
          example: "An error occurred" 
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
    
    Item:
      type: object
      description: "Details of an item within a package"
      required:
        - sku
      properties:
        sku:
          type: string
          description: "An ID that identify the product/variant from the brand's catalog."
          maxLength: 100
        upc:
          type: string
          description: "Universal Product Code for the item"
          maxLength: 100
        category:
          type: string
          description: "Category of Item"
          maxLength: 100
        quantity:
          type: integer
          format: int32
          description: "Number of items of the SKU"
          minimum: 1
        size:
          $ref: '#/components/schemas/Size'
        weight:
          $ref: '#/components/schemas/Weight'
        price:
          type: number
          format: double
          description: "Retail price of the item."
          minimum: 0
        salePrice:
          type: number
          format: double
          description: "Sale price of the item."
          minimum: 0
        image:
          type: string
          description: "Link to the image file of the item."
          maxLength: 200
        title:
          type: string
          description: "Title of the item."
          maxLength: 200
        description:
          type: string
          description: "Description of the item."
          maxLength: 10000
        itemAttributes:
          type: object
          description: "Custom item attributes."
        tags:
          type: array
          description: "Additional information related to the item."
          items:
            type: string
          minItems: 0
          maxItems: 20

    Customer:
      type: "object"
      properties:
        email:
          type: "string"
          example: "dhaval.parmar@deliverysolutions.co"
          maxLength: 100
        phone:
          type: "string"
          example: "+12015554312"
          maxLength: 20
        name:
          type: "string"
          example: "Dhaval Parmar"
          maxLength: 100
        userExternalId:
          type: "string"
          example: "test1"
          maxLength: 100

    OrderInfo:
      type: object
      description: "Subset of Order Object to control the rules."
      required:
        - orderValue
        - status
      properties:
        tips:
          type: integer
          minimum: 0
          description: "Optional tips for the order."
        type:
          type: string
          description: "Type of the order e.g. shipping, delivery, pickup."
        amount:
          type: integer
          format: int32
          minimum: 0
          description: "Any delivery or shipping charges applicable for the invoice."
        orderValue:
          type: number
          format: float
          minimum: 0
          description: "Cost of the order in major units. e.g. $10.43."
        orderAttributes:
          type: object
          description: "Key Value Pairs of attributes that you want to associate with the order."
          additionalProperties: true
        status:
          type: string
          description: "Status associated with the Order if any."
          maxLength: 100
        actualDeliveryTime:
          type: string
          format: date-time
          description: "The time at which the order was delivered."

    InvoiceRequest:
      type: object
      required:
        - orderExternalId
        - customer
        - orderInfo
        - brandExternalId
        - createdDate
        - timeZone
        - itemList
      properties:
        itemList:
          type: array
          items:
            $ref: "#/components/schemas/Item"
          description: 
             Array of Items for which Invoice has been created
        groupId:
          type: string
          maxLength: 100
          description: "E-commerce order id should be mapped to groupId field so that tracking and returns can be utilized efficiently."
        orderExternalId:
          type: string
          maxLength: 100
          description: "Order Id by which retailer can refer to the Invoice."
        customer:
          $ref: "#/components/schemas/Customer"
          description: "Customer Information for the Invoice."   
        orderInfo:
          description: "Subset of Order Object to control the rules."
