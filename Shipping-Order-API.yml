components:
  securitySchemes:
    OAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          x-tokenEndpointAuthMethod: client_secret_basic
          tokenUrl: https://api.lynkup.com/ent-services/security/v1/oauth/token
          scopes: {}
  schemas:
    Address:
      type: object
      description: Address of the location
      required:
        - street1
        - postalCode
      properties:
        street1:
          type: string
          description: Address Line 1 (Street Number and Street Name)
          maxLength: 100
        street2:
          type: string
          description: Address Line 2 (not to be used for apartment / suite #)
          maxLength: 100
        apartmentNumber:
          type: string
          description: Apartment / Suite #
          maxLength: 50
        city:
          type: string
          description: City
          maxLength: 100
        state:
          type: string
          description: State
          maxLength: 100
        postalCode:
          type: string
          description: Postal code or zip.
          maxLength: 20
        countryCode:
          type: string
          description: 2-letter country code in ISO 3166-1 alpha-2 format. If not provided defaults to 'US'.
          default: US
          enum: 
            - US
            - CA
            - GB
            - AU
            - IE
        latitude:
          type: number
          format: double
          description: Latitude coordinates of the address
        longitude:
          type: number
          format: double
          description: Longitude coordinates of the address

    Contact:
      type: object
      required:
        - name
        - phone
      description: Contact information.
      properties:
        name:
          type: string
          description: First Name of Contact
        phone:
          type: string
          description: Phone Number of the Contact
        email:
          type: string
          description: Email address of the Contact
    
    AlternateLocation:
      type: object
      properties:
        provider:
          type: string
          maxLength: 100
          description: "Provider associated with the alternate location"
        name:
          type: string
          maxLength: 100
          description: "Name of the alternate location"
        type:
          type: string
          maxLength: 100
          description: "Type of the alternate location"
        providerLocationId:
          type: string
          maxLength: 100
          description: "Unique identifier for the provider location"
        address:
          $ref: "#/components/schemas/Address"
        phoneNumber:
          type: string
          maxLength: 100
          description: "Phone number of the alternate location"
        locationTimings:
          type: array
          items:
            type: string
          maxItems: 50
          description: "Operating timings of the location"
      required:
        - provider
        - name
  
    ShipmentReferenceLinkObject:
      type: object
      properties:
        providerTrackingUrl:
          type:
            - string
            - 'null'
          maxLength: 1000
          format: uri
          description: "URL for provider tracking"
          example: "https://provider.example.com/tracking"
        labelLink:
          type:
            - string
            - 'null'
          maxLength: 1000
          description: "Label link generated for the shipment"
          example: "https://example.com/label"
        barcodeLink:
          type:
            - string
            - 'null'
          maxLength: 1000
          description: "Barcode link generated for the shipment"
          example: "https://example.com/barcode"
        qrcodeLink:
          type:
            - string
            - 'null'
          maxLength: 1000
          description: "QR code link generated for the shipment"
          example: "https://example.com/qrcode"
        trackingUrl:
          type:
            - string
            - 'null'
          maxLength: 100
          format: uri
          description: "Tracking URL for the shipment"
          example: "https://example.com/tracking"
        hostedTrackingUrl:
          type:
            - string
            - 'null'
          maxLength: 100
          format: uri
          description: "URL for hosted tracking"
          example: "https://example.com/hosted-tracking"
        hostedFeedbackUrl:
          type:
            - string
            - 'null'
          maxLength: 100
          format: uri
          description: "URL for hosted feedback"
          example: "https://example.com/feedback"
        returnsUrl:
          type:
            - string
            - 'null'
          maxLength: 100
          format: uri
          description: "URL for returns"
          example: "https://example.com/returns"
      required: []

    Customer:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          description: Name of the customer
        email:
          type: string
          maxLength: 100
          description: Email address of the customer
        phone:
          type: string
          maxLength: 20
          description: Phone number of the customer
        userExternalId:
          type: string
          maxLength: 100
          description: External identifier for the user
      required:
        - name
        - phone
          
    ErrorDetail:
      type: object
      required: 
        -  type
        -  message
      properties:
        type:
          type: string
        message:
          type: string
        parameter:
          type: 
            - string
            - 'null'
        entityId:
          type: 
            - string
            - 'null'
        entity:
          type: 
            - string
            - 'null'

    InvalidRequest:
      type: object
      properties:
        type:
          type: string
          example: "ERROR_TYPE"
        message:
          type: string
          example: "An error occurred" 
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'

    Weight:
      type: object
      description: Weight of an item
      required:
        - value
        - unit
      properties:
        value:
          type: number
          format: double
          description: weight
          minimum: 0
        unit: 
          type: string
          description: units for given weight in kg or lb
          enum: 
            - kg
            - lb

    Size:
      type: object
      description: Dimensions of the item.
      required:
        - height
        - width
        - length
        - unit
      properties:
        height:
          type: number
          format: double
          description: Height
          minimum: 0
        width:
          type: number
          format: double
          description: Width
          minimum: 0
        length:
          type: number
          format: double
          description: Length
          minimum: 0
        unit: 
          type: string
          description: units for given size in cm or in
          enum: 
            - cm
            - in
            
    ProviderInfo:
      type: object
      properties:
        id:
          oneOf:
            - type: "string"
            - type: "null"
          maxLength: 100
          description: "Unique identifier for the provider"
        name:
          oneOf:
            - type: "string"
            - type: "null"
          maxLength: 100
          description: "Name of the provider"
        displayName:
          oneOf:
            - type: "string"
            - type: "null"
          maxLength: 100
          description: "Display name of the provider"
        serviceType:
          oneOf:
            - type: "string"
            - type: "null"
          maxLength: 100
          description: "Type of service provided"
        serviceId:
          oneOf:
            - type: "string"
            - type: "null"
          maxLength: 100
          description: "Unique identifier for the service"
      required:
        - id
        - name
        - displayName
        - serviceType

    TimeWindow:
      type: object
      properties:
        startsAt:
          oneOf:
            - type: integer
              description: "Start of the window. Unix time in milliseconds. (conditional)"
              format: int64
            - type: "null"
        endsAt:
          oneOf:
            - type: integer
              description: "End of the window. Unix time in milliseconds. (conditional)"
              format: int64
            - type: "null"

    Attachment:
      type: object
      properties:
        type:
          type: string
          maxLength: 100
          description: "Type of the attachment"
        url:
          type: string
          format: uri
          description: "URL of the attachment"
      required:
        - type
        - url
     
    Vehicle:
      type: object
      properties:
        type:
          type: string
          maxLength: 100
          description: "Type of the vehicle"
        color:
          type: string
          maxLength: 100
          description: "Color of the vehicle"
        number:
          type: string
          maxLength: 100
          description: "License plate number of the vehicle"
        make:
          type: string
          maxLength: 100
          description: "Make of the vehicle"
        description:
          type: string
          maxLength: 1000
          description: "Additional description of the vehicle"
        parkingSlot:
          type: string
          maxLength: 100
          description: "Parking slot allocated to the vehicle"
        vehicleExternalId:
          type: string
          maxLength: 100
          description: "External identifier for the vehicle"
        vehicleId:
          type: string
          maxLength: 100
          description: "Unique identifier for the vehicle"
    
    SignatureInfo:
      type: object
      properties:
        signedBy:
          type: string
          maxLength: 100
          description: "Name of the person who signed"
        signatureLink:
          type: string
          maxLength: 100
          description: "URL link to the signature image or document"
        signedAt:
          type: string
          format: date-time
          description: "Timestamp of when the signature was made in ISO 8601 format"
    
    ProposedProvider:
      type: object
      properties:
        name:
          type: string
          maxLength: 1000
          description: "Name of the proposed provider"
        services:
          type: array
          items:
            $ref: "#/components/schemas/ProposedProviderService"
          description: "List of services associated with the provider"
      required:
        - name
    
    ProposedProviderService:
      type: object
      properties:
        id:
          type: string
          description: "Unique identifier for the proposed provider service"

    UndeliverableOrderReturnLocation:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          description: "Name of the return location"
        address:
         $ref: "#/components/schemas/Address"
        contact:
          $ref: "#/components/schemas/Contact"

    Label:
      type: object
      properties:
        trackingId:
          type: string
          maxLength: 100
          description: "Tracking ID associated with the label"
        file:
          type: string
          maxLength: 1000
          description: "File associated with the label"
        fileType:
          type: string
          maxLength: 100
          description: "Type of the file associated with the label"
        url:
          type: string
          maxLength: 1000
          description: "URL to access the label or related file"
        code:
          type: string
          maxLength: 100
          description: "Code associated with the label"
        qrCodeImage:
          type: string
          maxLength: 1000
          description: "URL to the QR code image for the label"
        barcodeImage:
          type: string
          maxLength: 1000
          description: "URL to the barcode image for the label"
      required: []
    
    Item:
      type: object
      description: "Details of an item within a package"
      required:
        - sku
      properties:
        sku:
          type: string
          description: "An ID that identify the product/variant from the brand's catalog."
          maxLength: 100
        upc:
          type: string
          description: "Universal Product Code for the item"
          maxLength: 100
        category:
          type: string
          description: "Category of Item"
          maxLength: 100
        quantity:
          type: integer
          format: int32
          description: "Number of items of the SKU"
          minimum: 1
        size:
          $ref: '#/components/schemas/Size'
        weight:
          $ref: '#/components/schemas/Weight'
        price:
          type: number
          format: double
          description: "Retail price of the item."
          minimum: 0
        salePrice:
          type: number
          format: double
          description: "Sale price of the item."
          minimum: 0
        image:
          type: string
          description: "Link to the image file of the item."
          maxLength: 200
        title:
          type: string
          description: "Title of the item."
          maxLength: 200
        description:
          type: string
          description: "Description of the item."
          maxLength: 10000
        itemAttributes:
          type: object
          description: "Custom item attributes."
        tags:
          type: array
          description: "Additional information related to the item."
          items:
            type: string
          minItems: 0
          maxItems: 20
    
    Package:
      type: object
      description: "Package Details"
      required:
        - name
      properties:
        name:
          type: string
          description: "Name of package created in our system, or pass the value 'custom'."
          default: "custom"
          maxLength: 100
        description:
          type: string
          description: "A brief description about the package contents."
          maxLength: 10000
        size:
          $ref: '#/components/schemas/Size'
        weight:
          $ref: '#/components/schemas/Weight'
        itemQuantity:
          type: integer
          format: int32
          description: "Number of items in a single package."
          minimum: 1
        itemList:
          type: array
          description: "Array of items in the package."
          items:
            $ref: '#/components/schemas/Item'
          maxItems: 1000
        temperatureControl:
          type: string
          description: "Temperature information of the package"
          enum:
            - frozen
            - refrigerated
            - cool
            - ambient
            - warm
            - none
        content:
          type: array
          description: "Content information of the package"
          items:
            type : string
            enum:
            - alcohol
            - fragile
            - tobacco
            - rx
            - perishable
        barcode:
          type: string
          description: "Barcode sent to the provider for scanning the package"
          default: "null"
          maxLength: 500

    ReturnRequest:
      type: object
      properties:
        rmaId:
          type: string
          maxLength: 100
          description: "Return Merchandise Authorization (RMA) ID"
        orderExternalId:
          type: string
          maxLength: 100
          description: "External ID of the associated order"
        locationExternalId:
          type: string
          maxLength: 100
          description: "External ID of the return location"
        returnMethodCode:
          type: string
          maxLength: 100
          description: "Code indicating the return method"
        fee:
          type: number
          format: double
          maximum: 100
          minimum: 0
          description: "Fee associated with the return request"
      required: []

    Pickup:
      type: object
      required: 
        -  name
        -  address
        -  contact
      properties:
        name:
          type: string
          maxLength: 100
          description: "Name of the location"
        locationExternalId:
          type: string
          maxLength: 100
          description: "Unique external identifier for the location."
        brandExternalId:
          type: string
          maxLength: 100
          description: "Unique identifier for the brand associated with the order."
        address:
          $ref: '#/components/schemas/Address'
          description: "Address where the package will be picked up."
        pickupInstructions:
          type: string
          maxLength: 10000
          description: "Pickup instructions for the location."
        contact:
          $ref: '#/components/schemas/Contact'
          description: "Details of the contact person at the pickup location."
        providers:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: "name of the provider"
        providerAttributes:
          type: object
          additionalProperties:
            oneOf: 
              -  type: string
              -  type: number


    ShipmentRequest:
      type: object
      properties:
        orderExternalId:
          type: string
          maxLength: 100
          description: "Identifier for the order generated in the client system"
        groupId:
          type: string
          maxLength: 100
          description: "Group ID used to group multiple orders together, providing a combined post-purchase experience."
        pickupTime:
          oneOf: 
            - $ref: '#/components/schemas/TimeWindow' 
            - type: "null"
          description: "Time window during which the package will be ready for pickup."
        deliveryTime:
          oneOf: 
            - $ref: '#/components/schemas/TimeWindow' 
            - type: "null"
          description: "Time window during which the package must be delivered."
        locationExternalId:
          type: string
          maxLength: 100
          description: "Unique identifier for the pickup location (see Create Location API)."
        deliveryAddress:
          $ref: '#/components/schemas/Address'
          description: "Address where the package will be delivered."
        deliveryContact:
          $ref: '#/components/schemas/Customer'
          description: "Customer contact details for the shipment."
        itemList:
          type: array
          items:
            $ref: '#/components/schemas/Item'
          maxItems: 100
          description: 
            Array of items included in the shipment order. 
            Each item in this list represents a unique SKU with its associated details and quantities.
            These items are referenced by the `itemList` property within the package.
        package:
          type: object
          $ref: '#/components/schemas/Package'
          description: 
            Details of the package included in the shipment order.
            Package contains an `itemList` property that references items from the order `itemList` by SKU.
            The `quantity` of each item within a package must not exceed the total `quantity` provided for that item in the `itemList`.
        signature:
          type: string
          enum: ["unattended", "required_recipient", "required", "not_required"]
          maxLength: 100
          description: "Indicates whether a signature is required for the shipment. Defaults to provider-level configuration if not specified."
        deliveryInstructions:
          oneOf: 
            - type: string
              maxLength: 10000
            - type: "null"        
          description: "Special instructions for the Delivery location."
        orderValue:
          type: number
          minimum: 0
          description: "Total value of the order in major units as a decimal, e.g. 10.00 ($10.00 USD)"
        locale:
          type: string
          maxLength: 5
          description: |
            "Preferred locale by the customer for the order, following the BCP47 format. 
            Examples: 'en-US' (English - United States), 'fr-CA' (French - Canada)."
        createdDate:
          type: number
          description: "The original creation date of the order in Unix time (milliseconds)."
        orderAttributes:
          type: object
          additionalProperties:
            oneOf:
              - type: string
                maxLength: 500
              - type: number
              - type: boolean
              - type: array
                items:
                  type: string
                maxItems: 100
              - type: array
                items:
                  type: number
                maxItems: 100
              - type: array
                items:
                  type: boolean
                maxItems: 100
          description: "Custom key-value pairs for configurable order attributes."
        proposedProviders:
          type: array
          items:
            $ref: '#/components/schemas/ProposedProvider'
          description: "Overrides orchestration and places the order with specified providers."
        pickup:
          type: object
          $ref: '#/components/schemas/Pickup'
          description: 'Details of the location to be specified in case locationExternalId is not provided in the request.'
      required:
        - orderExternalId
        - deliveryContact
        - deliveryAddress
      oneOf:
        - required: ["locationExternalId"]
        - required: ["pickup"]

    ShipmentResponse:
      type: object
      properties:
        id:
          type: string
          description: "Unique identifier for the shipment record generated by the system."
          pattern: '^[a-fA-F0-9]{24}$'
          example: '60b8d6c9e4b0f5d3a1a6e500'
        orderExternalId:
          type: string
          maxLength: 100
          description: "Identifier for the order generated in the client system"
        tenantId:
          type: string
          maxLength: 200
          description: "Unique identifier for the tenant making the shipment request."
        groupId:
          oneOf:
            - type: string
            - type: "null"
          maxLength: 100
          description: "Group ID used to group multiple orders together for combined post-purchase experiences."
        trackingId:
          type: string
          maxLength: 100
          description: "Unique tracking ID for monitoring shipment progress."
        pickupTime:
          $ref: '#/components/schemas/TimeWindow'
          description: "Time window indicating when the package will be ready for pickup."
        deliveryTime:
          $ref: '#/components/schemas/TimeWindow'
          description: "Time window indicating when the package is expected to be delivered."
        actualDeliveryTime:
          oneOf:
            - type: number
            - type: "null"
          minimum: 0
          description: "Actual timestamp in milliseconds for when the package was delivered."
        actualPickupTime:
          oneOf:
            - type: number
            - type: "null"
          minimum: 0
          description: "Actual timestamp in milliseconds for when the package was picked up."
        estimatedPickupTime:
          $ref: '#/components/schemas/TimeWindow'
          description: "Estimated time window for picking up the package."
        estimatedDeliveryTime:
          $ref: '#/components/schemas/TimeWindow'
          description: "Estimated time window for delivering the package."
        locationExternalId:
          type: string
          maxLength: 100
          description: "Unique external identifier for the delivery location."
        brandExternalId:
          type: string
          maxLength: 100
          description: "Unique identifier for the brand associated with the order."
        deliveryAddress:
          $ref: '#/components/schemas/Address'
          description: "Address where the package will be delivered."
        pickupAddress:
          $ref: '#/components/schemas/Address'
          description: "Address where the package will be picked up."
        provider:
          oneOf:
            - $ref: '#/components/schemas/ProviderInfo'
            - type: "null"
          description: "Information about the provider handling the shipment."
        deliveryContact:
          $ref: '#/components/schemas/Customer'
          description: "Details of the customer receiving the shipment."
        pickupContact:
          $ref: '#/components/schemas/Contact'
          description: "Details of the contact person at the pickup location."
        itemList:
          type: array
          items:
            $ref: '#/components/schemas/Item'
          maxItems: 100
          description: 
            Array of items included in the shipment order. 
            Each item in this list represents a unique SKU with its associated details and quantities.
            These items are referenced by the `itemList` property within the package.
        package:
          type: object
          $ref: '#/components/schemas/Package'
          description: 
            Details of the package included in the shipment order.
            Package contains an `itemList` property that references items from the order `itemList` by SKU.
            The `quantity` of each item within a package must not exceed the total `quantity` provided for that item in the `itemList`.
        status:
          type: string
          maxLength: 100
          enum:
            - REQUEST_RECEIVED
            - PENDING_DISPATCH
            - PENDING_RELEASE
            - PENDING_AUTORETRY
            - ESTIMATES_RECEIVED
            - ESTIMATES_FAILED
            - ORDER_DISPATCHED
            - STAGED
            - ORDER_FAILED
            - ORDER_ASSIGNED
            - ORDER_UNASSIGNED
            - PICKUP_STARTED
            - PICKUP_COMPLETED
            - IN_TRANSIT
            - OUT_FOR_DELIVERY
            - ORDER_AT_LOCATION
            - ORDER_DELIVERED
            - ORDER_DELAYED
            - ORDER_REDELIVERY
            - ORDER_UNDELIVERABLE
            - ERROR_EXCEPTION
            - ORDER_CANCELLED
            - PARTIAL_CANCELLED
            - PARTIAL_EXCEPTION
            - PARTIAL_DELIVERED
            - PARTIAL_IN_TRANSIT
          description: "Current status of the shipment (e.g., in transit, delivered)."
        signature:
          type: string
          enum: ["unattended", "required_recipient", "required", "not_required"]
          maxLength: 100
          description: "Signature requirement for the delivery."
        deliveryInstructions:
          oneOf:
            - type: string
              maxLength: 10000
            - type: "null"
          description: "Instructions for the driver regarding the delivery."
        pickupInstructions:
          type: string
          maxLength: 10000
          description: "Instructions for the driver regarding the pickup."
        label:
          oneOf:
            - type: "object"
              $ref: '#/components/schemas/Label'
            - type: "null"
          description: "Details of the label associated with the shipment (e.g., fragile, perishable)."
        referenceLinks:
          $ref: "#/components/schemas/ShipmentReferenceLinkObject"
          description: "Reference links for the shipment, such as tracking URLs."
        orderValue:
          type: number
          minimum: 0
          format: double
          description: "Total value of the order in major units as a decimal, e.g. 10.00 ($10.00 USD)."
        fee:
          oneOf:
            - type: "number"
            - type: "null"
          minimum: 0
          format: double
          description: "Fee charged for the delivery service."
        amount:
          oneOf:
            - type: "number"
            - type: "null"
          minimum: 0
          format: double
          description: "Total amount charged for the delivery service."
        proposedProviders:
          type: array
          items:
            $ref: '#/components/schemas/ProposedProvider'
          maxItems: 50
          description: "Array of proposed providers to override default orchestration for shipment."
        signatureInfo:
          $ref: '#/components/schemas/SignatureInfo'
          description: "Information regarding the signature obtained for the shipment."
        attachments:
          oneOf:
            - type: "array"
              items:
                $ref: '#/components/schemas/Attachment'
            - type: "null"
          description: "Array of attachments associated with the shipment(e.g., images, documents)."
        vehicle:
          oneOf:
            - $ref: '#/components/schemas/Vehicle'
            - type: "null"
          description: "Details of the vehicle used for the shipment."
        feedback:
          oneOf:
            - $ref: "#/components/schemas/Feedback"
            - type: "null"
          description: "Feedback provided for the delivery experience."
        returnLocationId:
          type: string
          maxLength: 100
          description: "Identifier for the return location in case the shipment is undeliverable."
        returnRequest:
          oneOf:
            - $ref: '#/components/schemas/ReturnRequest'
            - type: "null"
          description: "Details of the return request, if applicable."
        undeliverableOrderReturnLocation:
          $ref: '#/components/schemas/UndeliverableOrderReturnLocation'
          description: "Details of the location where undeliverable orders are returned."
        orderAttributes:
          type: object
          additionalProperties:
            oneOf:
              - type: string
                maxLength: 500
              - type: number
              - type: boolean
              - type: array
                items:
                  type: string
                maxItems: 100
              - type: array
                items:
                  type: number
                maxItems: 100
              - type: array
                items:
                  type: boolean
                maxItems: 100
          description: "Key-value pairs of custom order attributes."
        currencyCode:
          type: string
          maxLength: 3
          description: "Currency code following ISO 4217 standards (e.g., USD)."
        locale:
          type: string
          maxLength: 5
          description: |
            Locale of the shipment request, in IETF BCP 47 format (e.g., 'en-US' for English - United States).
        createdDate:
          type: number
          description: "Unix timestamp in milliseconds representing the creation date of the shipment record."
        createdAt:
          type: string
          description: "ISO 8601 formatted date for when the shipment record was created."
        lastUpdatedAt:
          type: string
          description: "ISO 8601 formatted date for when the shipment record was last updated."
        alternateLocation:
          $ref: "#/components/schemas/AlternateLocation"
      required:
        - orderExternalId
        - deliveryAddress
        - deliveryContact
        - locationExternalId
        - tenantId
        - createdAt
        - lastUpdatedAt

    ListShipmentsRequest:
      type: "object"
      properties:
        limit:
          type: "integer"
          description: "Limit the number of orders in the response. If not passed, the default is 1000. The maximum allowed is 1000."
          maximum: 1000
          format: "int32"
        lastUpdatedAt:
          type: "object"
          description: "Get all the orders which were updated within the provided time window. The time window cannot be greater than 30 days."
          $ref: "#/components/schemas/TimeWindow"
        orderExternalIds:
          type: "array"
          maxItems: 100
          description: "Get the orders for the provided array of orderExternalIds."
          items:
            type: "string"
        groupId:
          type: "string"
          description: "Get orders belonging to the provided groupId. This value is case-sensitive."
        locationExternalIds:
          type: "array"
          maxItems: 100
          description: "Get the orders for the provided array of locationExternalIds."
          items:
            type: "string"
        pickupTime:
          type: "object"
          description: "Get all orders whose pickupTime.startsAt is greater than or equal to the provided value. Only accepts startsAt from the Time Window. If pickupTime is present, deliveryTime.endsAt is required."
          properties:
            startsAt:
              oneOf:
                - type: integer
                  description: "Start of the window. Unix time in milliseconds. (conditional)"
                  format: int64
                - type: "null"
        deliveryTime:
          type: "object"
          description: "Get all orders whose deliveryTime.endsAt is lesser than or equal to the provided value. Only accepts endsAt from the Time Window. If deliveryTime is present pickupTime.startsAt is required."
          properties:
            endsAt:
              oneOf:
                - type: integer
                  description: "End of the window. Unix time in milliseconds. (conditional)"
                  format: int64
                - type: "null"
        createdAt:
          type: "object"
          description: "Get all orders which were created within the provided time window. The time window cannot be greater than 30 days."
          $ref: "#/components/schemas/TimeWindow"
        status:
          type: "array"
          description: "Get all orders having the provided statuses."
          items:
            type: "string"
        paginationToken:
          type: "string"
          description: |
            The API has a limit of retrieving 1000 orders per call. If limit value is specified in the request, the number of orders are retrieved as per the value indicated in the limit (limit cannot be more than 1000). Use the paginationToken to navigate to the next or previous set of orders.

            paginationToken returns an object of next and previous tokens:
            If there are no results for the next page, the next value would be null.
            If there are no results for the previous page, the previous value would be null.
            To navigate to the next set of page results, use the next value from the paginationToken response and set it as the paginationToken value.
            To navigate to the previous set of page results, use the previous value from the paginationToken response and set it as the paginationToken value.
                
    OrderStatus:
      type: object
      properties:
        orderId:
          type: string
          maxLength: 100
          description: "Unique Identifier for the order"
        tenantId:
          type: string
