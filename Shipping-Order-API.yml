      description: "Use this API to retrieve the shipment details with the external Id (```shipment_id```) that was used in [Create Shipment](doc:create-shipment)."
      operationId: "getShipmentByExternalid"
      tags:
        - Shipping Order
      security:
        - OAuth2ClientCredentials: []
      parameters:
        - name: version
