            description: "Tracking URL"
        orderStatus:
          type: array
          items:
            type: object
            properties:
              status:
                type: "string"
                description: "Status of the order"
                enum:
                  - REQUEST_RECEIVED
                  - PENDING_DISPATCH
                  - PENDING_RELEASE
                  - PENDING_AUTORETRY
                  - ESTIMATES_RECEIVED
                  - ESTIMATES_FAILED
                  - ORDER_DISPATCHED
                  - STAGED
                  - ORDER_FAILED
                  - ORDER_ASSIGNED
                  - ORDER_UNASSIGNED
                  - PICKUP_STARTED
                  - PICKUP_COMPLETED
                  - IN_TRANSIT
                  - OUT_FOR_DELIVERY
                  - ORDER_AT_LOCATION
                  - ORDER_DELIVERED
                  - ORDER_DELAYED
                  - ORDER_REDELIVERY
                  - ORDER_UNDELIVERABLE
                  - ERROR_EXCEPTION
                  - ORDER_CANCELLED
                  - PARTIAL_CANCELLED
                  - PARTIAL_EXCEPTION
                  - PARTIAL_DELIVERED
                  - PARTIAL_IN_TRANSIT
                  
              updatedAt:
