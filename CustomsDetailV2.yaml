openapi: 3.1.0
info:
  title: Customs Detail API v2
  version: "1.0"
  description: >
   # Product Info
    Provides clients with up‑to‑date compliance requirements for data fields that must be captured for UPS shipments. The API then validates these field values and submits them for backend merging into the shipment. For more information on the Customs Detail API, please visit the <a href="https://developer.ups.com/api/reference/customsdetail/product-info"
    target="_blank" rel="noopener">Product Info</a> page.<br/><br/>

    # Key Business Values
    - Ensures clients always receive the latest compliance requirements.
    - Allows field collection to be fully managed through configurable user settings.
    - Flexible framework eliminates additional code changes as compliance fields evolve.
    - Flexible field model supports new country rules without disruptive changes, so you can expand lanes and stay current as regulations evolve.

    # Reference
    - <a href="https://developer.ups.com/api/reference/customdetails/error-codes" target="_blank" rel="noopener">Errors</a>
    - <a href="https://developer.ups.com/api/reference/customdetails/faq" target="_blank" rel="noopener">FAQ</a>
   
     <br/>
    <p>Try out UPS APIs with example requests using Postman and learn more about the UPS Postman Collection by visiting our <a href="https://developer.ups.com/api/reference/postman/guide"
    target="_blank" rel="noopener">Postman Guide</a>. Explore API documentation and sample applications through GitHub.</p>
    
    <a href="https://god.gw.postman.com/run-collection/29542085-f2cd7176-bd05-48ea-bb72-b359a11cff09?action=collection%2Ffork&source=rip_markdown&collection-url=entityId%3D29542085-f2cd7176-bd05-48ea-bb72-b359a11cff09%26entityType%3Dcollection%26workspaceId%3D7e7595f0-4829-4f9a-aee1-75c126b9d417" target="_blank" rel="noopener noreferrer">
      <img src="https://run.pstmn.io/button.svg" alt="Run In Postman" style="width: 128px; height: 32px;"></a>
    <a href="https://github.com/UPS-API" target="_blank" rel="noopener noreferrer">
      <img src="https://www.ups.com/assets/resources/webcontent/images/gitHubButton.svg" alt="Open in GitHub " style="width: 128px; height: 32px;">
servers:
  - url: https://onlinetools.ups.com/api/trade/compliance/{version}
    description: Production
  - url: https://wwwcie.ups.com/api/trade/compliance/{version}
    description: CIE

tags:
  - name: Customs Detail
    description:  Endpoints related to the required fields
paths:
  /content/fields/customs-detail:
    post:
      summary: Validate and/or submit the fields
      description: This endpoint will provide the ability to validate and/or submit the additional field information for a shipment
      parameters:
        - $ref: "#/components/parameters/transId"
        - $ref: "#/components/parameters/transactionSrc"
        - $ref: "#/components/parameters/Content-Type"
        - name: registrationId
          in: header
          required: false
          schema:
            type: string
            description: this field is required for ews/fws/worldship
            example: 3DA124234342
        - in: path
          name: version
          required: true
          schema:
            type: string
            default: v2
            enum:
              - v2
          description: |
            Version

            Valid values:
            - v2
      operationId: postCustomDetailData
      security:
        - OAuth2: []
      tags:
        - Customs Detail
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomDetailsPostFieldsRequestv2"
            example:
              actionType: save
              shipperNumber: 1443YY
              trackingNumber: 1Z1443YY0161231327
              invoiceFormGroupId: 1F1443YY0161231327
              shipmentType: Gift
              shipmentWeight: 32456
              shipmentWeightUnit: KGS
              shipmentValue: 10000
              shipmentValueCurrency: USD
              userRoles: [Importer,Exporter]
              commerceModel: B2B
              shipmentMetaData:
                - groupKey: DE-EXP-MRN
                  fields:
                    - fieldKey: DEEORI
                      fieldValue: "MN123456789"
                - groupKey: IN-EXP-CSB
                  fields:
                    - fieldKey: CSBType
                      fieldValue: "3"
                    - fieldKey: IECCode
                      fieldValue: "1234567890"
              products:
                - productId: PART-001
                  productDescription: Medical device
                  lineNumber: 001
                  commodityCode: "3821000010"
                  productMetaData:
                    - groupKey: US-IMP-FDA
                      fields:
                        - fieldKey: MnuNa
                          regulationSections:
                            - sectionKey: Cos
                            - sectionKey: Bio
                            - sectionKey: Dev
                            - sectionKey: Foo
                          fieldValue: UPS Labs
                        - fieldKey: MnuAdLn1Te
                          regulationSections:
                            - sectionKey: Cos
                            - sectionKey: Bio
                            - sectionKey: Dev
                            - sectionKey: Foo
                          fieldValue: "55 Glenlake Pkwy NE"
                        - fieldKey: MnuAdLn2Te
                          regulationSections:
                            - sectionKey: Cos
                            - sectionKey: Bio
                            - sectionKey: Dev
                            - sectionKey: Foo
                          fieldValue: "Suite 400"
                        - fieldKey: MnuAdLn3Te
                          regulationSections:
                            - sectionKey: Cos
                            - sectionKey: Bio
                            - sectionKey: Dev
                            - sectionKey: Foo
                          fieldValue: "Building C"
                        - fieldKey: MnuCtyNa
                          regulationSections:
                            - sectionKey: Cos
                            - sectionKey: Bio
                            - sectionKey: Dev
                            - sectionKey: Foo
                          fieldValue: "Atlanta"
                        - fieldKey: MnuStPrvCd
                          regulationSections:
                            - sectionKey: Cos
                            - sectionKey: Bio
                            - sectionKey: Dev
                            - sectionKey: Foo
                          fieldValue: "GA"
                        - fieldKey: MnuCtyCd
                          regulationSections:
                            - sectionKey: Cos
                            - sectionKey: Bio
                            - sectionKey: Dev
                            - sectionKey: Foo
                          fieldValue: "US"
                        - fieldKey: MnuPslCd
                          regulationSections:
                            - sectionKey: Cos
                            - sectionKey: Bio
                            - sectionKey: Dev
                            - sectionKey: Foo
                          fieldValue: "30301"
                - productId: PART-002
                  productDescription: Sample pharma goods
                  commodityCode: "300490"
                  productMetaData:
                    - groupKey: US-IMP-232
                      fields:
                        - fieldKey: NddUseAutIr
                          regulationSections:
                            - sectionKey: Alum
                          fieldValue: Yes
                        - fieldKey: AlumCnxPr
                          regulationSections:
                            - sectionKey: Alum
                          fieldValue: "Test"
                        - fieldKey: AlumPrc1CnyCd
                          regulationSections:
                            - sectionKey: Alum
                          fieldValue: Testing
                        - fieldKey: Prc2CnyCd
                          regulationSections:
                            - sectionKey: Alum
                          fieldValue: Go
      responses:
        "204":
          description: Success
          headers:
            BkndTransId:
              $ref: "#/components/headers/BkndTransId"
            TransId:
              $ref: "#/components/headers/transId"
            transactionSrc:
              $ref: "#/components/headers/transactionSrc"
            Content-Type:
              $ref: "#/components/headers/Content-Type"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "500":
          $ref: '#/components/responses/ServerError'
    get:
      summary: Returns required Custom Details
      description: This returns an array of fields that are required for the provided import and/or export country
      parameters:
        - $ref: "#/components/parameters/transId"
        - $ref: "#/components/parameters/transactionSrc"
        - $ref: "#/components/parameters/Content-Type"
        - in: path
          name: version
          required: true
          schema:
            type: string
            default: v2
            enum:
              - v2
          description: |
            Version

            Valid values:
            - v2
        - name: import_country_code
          in: query
          required: false
          schema:
            type: 
              - string
              - "null"
            description: |
              The <a href="https://www.iso.org/iso-3166-country-codes.html" target="_blank">ISO 3166</a> country or territory code
              from where the shipment is being imported to. If this is omitted then all import fields for all countries will be returned
            minLength: 2
            maxLength: 2
            pattern: ^[A-Z]{2}$
            example: US
        - name: export_country_code
          in: query
          required: false
          schema:
            type: 
              - string
              - "null"
            description: |
              The <a href="https://www.iso.org/iso-3166-country-codes.html" target="_blank">ISO 3166</a> country or territory code
              from where the shipment is being exported from. If this is omitted then all export fields for all countries will be returned
            minLength: 2
            maxLength: 2
            pattern: ^[A-Z]{2}$
            example: IT
        - name: locale
          in: query
          required: false
          schema:
            type: string
            description: ""
            minLength: 5
            maxLength: 5
            pattern: ^[a-z]{2}-[A-Z]{2}$
            default: en-US
            example: en-US
        - name: commodity_codes
          in: query
          required: false
          description: comma-separated list of tariff code for the product for the selected import country and process type  to filter results.
          schema:
            type: 
              - string
              - "null"
            minLength: 1
            maxLength: 2000
            example: "2926400000,3003395000"
        - name: shipment_type
          in: query
          required: false
          schema:
            type: string
            description: The type of shipment.
            enum:
              - Gift
              - Commercial
              - Sale
              - Sample
              - Repair
              - Return
              - Other
            example: Gift
        - name: shipment_weight
          in: query
          required: false
          schema:
            type: integer
            description: The total weight of the shipment.
            example: 32456	
        - name: shipment_weight_unit
          in: query
          required: false
          schema:
            type: string
            description: The unit of measure for shipment_weight.
            enum:
              - LBS
              - KGS
            example: KGS
        - name: shipment_value
          in: query
          required: false
          schema:
            type: integer
            description: The total declared value of the shipment.
            example: 10000
        - name: shipment_value_currency
          in: query
          required: false
          schema:
            type: string
            description: The <a href="https://www.iso.org/iso-4217-currency-codes.html" target="_blank">ISO 4217</a> currency code.
            minLength: 3
            maxLength: 3
            pattern: ^[A-Z]{3}
            example: USD
        - name: user_roles
          in: query
          required: false
          schema:
            type: array
            description: Comma-separated list of user roles.
            items:
              type: string
            example: [Importer,Exporter]
        - name: commerce_model
          in: query
          required: false
          schema:
            type: string
            description: The commerce model used for this shipment.
            enum:
              - B2B
              - B2C
              - C2B
              - C2C
            example: B2B			
      operationId: getCustomDetailData
      security:
        - OAuth2: []
      tags:
        - Customs Detail
      responses:
          "200":
            description: Success
            headers:
              BkndTransId:
                $ref: "#/components/headers/BkndTransId"
              TransId:
                $ref: "#/components/headers/transId"
              transactionSrc:
                $ref: "#/components/headers/transactionSrc"
              Content-Type:
                $ref: "#/components/headers/Content-Type"
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/CustomDetailsGetFieldsSuccessResponsev2"
                example:
                  commodityCodes:
                    - commodityCode: "2926400000"
                      regulations:
                        - regulation: FDA
                          regulationSections:
                            - sectionKey: Bio
                    - commodityCode: "3003395000"
                      regulations:
                        - regulation: FDA
                          regulationSections:
                            - sectionKey: Bio
                    - commodityCode: "All"
                      regulations:
                        - regulation: FDA
                          regulationSections:
                            - sectionKey: Foo
                  fieldGroups:
                    - countryCode: US
                      countryName: UNITED STATES OF AMERICA
                      shipmentType: Import
                      groupKey: US-IMP-FDA
                      details: This is for US import FDA fields
                      regulation: FDA
                      regulationSections:
                        - sectionKey: Cos
                          sectionName: Cosmetics
                        - sectionKey: Bio
                          sectionName: Biologics
                        - sectionKey: Dev
                          sectionName: Device
                        - sectionKey: Foo
                          sectionName: Food
                      validationRules:
                        - rule: "SteelContentPercentage + AluminumContentPercentage + CopperContentPercentage <= 100"
                        - errorMessage: "Steel, aluminum, and copper percentages cannot total more than 100."
                      fields:
                        - sectionKey: MnuNa
                          label: Manufacturer Name
                          order: "1"
                          tooltip: Type of shipping bill to be processed for the shipment
                          isRequired: C
                          requirementConditions:
                            - fieldKey: MnuPslCd
                              operator: "!="
                              value: ""
                          displayConditions:
                            - ruleType: request
                              fieldKey: shipmentWeight
                              operator: ">"
                              value: "5000"
                              unit: KGS
                            - ruleType: fieldInput
                              fieldKey: SteelContentPercentage
                              operator: ">"
                              value: "0"
                              unit: null
                          fieldType: textbox
                          allowedValueCount: 1
                          validation:
                            minLength: null
                            maxLength: null
                            errorMessage: Enter a valid value
                            dataType: Text
                            regexPattern: null
                            listValues: []
                          regulationSections:
                            - sectionKey: Cos
                            - sectionKey: Bio
                            - sectionKey: Dev
                            - sectionKey: Foo
                          keyAlias: ManufacturerName
                          level: Product
                          includeOnInvoice: false
                        - sectionKey: MnuPslCd
                          label: Manufacturer Postal Code
                          order: "8"
                          tooltip: The postal code address of the manufacturer for the product
                          isRequired: Y
                          requirementConditions: null
                          displayConditions: null
                          fieldType: textbox
                          allowedValueCount: 1
                          validation:
                            minLength: null
                            maxLength: null
                            errorMessage: Enter a valid value
                            dataType: Text
                            regexPattern: null
                            listValues: []
                          regulationSections:
                            - sectionKey: Cos
                            - sectionKey: Bio
                            - sectionKey: Dev
                            - sectionKey: Foo
                          keyAlias: ManufacturerPostalCode
                          level: Product
                        - sectionKey: MnuAdLn1Te
                          label: Manufacturer Address Line 1
                          order: "1"
                          tooltip: Line 1 of the address of the manufacturer for the product
                          isRequired: N
                          requirementConditions: null
                          displayConditions: null
                          fieldType: textbox
                          allowedValueCount: 1
                          validation:
                            minLength: null
                            maxLength: null
                            errorMessage: Enter a valid value
                            dataType: Text
                            regexPattern: null
                            listValues: []
                          regulationSections:
                            - sectionKey: Cos
                            - sectionKey: Bio
                            - sectionKey: Dev
                            - sectionKey: Foo
                          keyAlias: ManufacturerAddressLine1
                          level: Product
                        - sectionKey: MnuAdLn2Te
                          label: Manufacturer Address Line 2
                          order: "1"
                          tooltip: Line 2 of the address of the manufacturer for the product
                          isRequired: N
                          requirementConditions: null
                          displayConditions: null
                          fieldType: textbox
                          allowedValueCount: 1
                          validation:
                            minLength: null
