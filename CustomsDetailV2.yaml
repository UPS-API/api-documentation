                            errorMessage: Enter a valid value
                            dataType: Text
                            regexPattern: null
                            listValues: []
                          regulationSections:
                            - sectionKey: Cos
                            - sectionKey: Bio
                            - sectionKey: Dev
                            - sectionKey: Foo
                          keyAlias: ManufacturerAddressLine3
                          level: Product
                        - sectionKey: MnuCtyNa
                          label: Manufacturer City Name
                          order: "1"
                          tooltip: Line 3 of the address of the manufacturer for the product
                          isRequired: N
                          requirementConditions: null
                          displayConditions: null
                          fieldType: textbox
                          allowedValueCount: 1
                          validation:
                            minLength: null
                            maxLength: null
                            errorMessage: Enter a valid value
                            dataType: Text
                            regexPattern: null
                            listValues: []
                          regulationSections:
                            - sectionKey: Cos
                            - sectionKey: Bio
                            - sectionKey: Dev
                            - sectionKey: Foo
