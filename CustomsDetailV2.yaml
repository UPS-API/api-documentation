                            errorMessage: Enter a valid value
                            dataType: Text
                            regexPattern: null
                            listValues: []
                          regulationSections:
                            - sectionKey: Cos
                            - sectionKey: Bio
                            - sectionKey: Dev
                            - sectionKey: Foo
                          keyAlias: ManufacturerAddressLine2
                          level: Product
                        - sectionKey: MnuAdLn3Te
